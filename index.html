        const secs = Math.floor(this.levelTime / 1000);
        const mins = Math.floor(secs / 60);
        this.timerText.setText(mins + ':' + String(secs % 60).padStart(2, '0'));

        const body = this.player.body;
        const onGround = body.blocked.down;
        const dt = delta / 1000;

        // Check if on ice
        let onIce = false;
        if (onGround) {
            for (const ip of this.icePositions) {
                if (Math.abs(this.player.x - ip.x) < TILE_SIZE && Math.abs(this.player.y + this.stats.height / 2 - ip.y) < TILE_SIZE) {
                    onIce = true; break;
                }
            }
        }

        // Update touch edge detection
        updateTouchEdges();

        // Movement (keyboard + touch)
        const accel = onIce ? this.stats.speed * 0.3 : this.stats.speed;
        const moveLeft = this.cursors.left.isDown || this.wasd.a.isDown || touchInput.left;
        const moveRight = this.cursors.right.isDown || this.wasd.d.isDown || touchInput.right;
        if (moveLeft) {
            if (onIce) {
                body.setAccelerationX(-accel * 3);
            } else {
                body.setVelocityX(-this.stats.speed);
            }
            this.facingRight = false;
            this.player.setFlipX(true);
        } else if (moveRight) {
            if (onIce) {
                body.setAccelerationX(accel * 3);
            } else {
                body.setVelocityX(this.stats.speed);
            }
            this.facingRight = true;
            this.player.setFlipX(false);
        } else {
            if (onIce) {
                body.setAccelerationX(0);
                body.setVelocityX(body.velocity.x * 0.92);
            } else {
                body.setVelocityX(0);
                body.setAccelerationX(0);
            }
        }

        // Dog-specific particle trail
        this.spawnTrail();

        // Jump (Space, W, or touch)
        const jumpPressed = Phaser.Input.Keyboard.JustDown(this.cursors.space) ||
                            Phaser.Input.Keyboard.JustDown(this.wasd.w) ||
                            touchJustDown.jump;
        if (jumpPressed) {
            if (onGround) {
                body.setVelocityY(this.stats.jump);
                this.hasDoubleJumped = false;
                sfx.play('jump');
                this.spawnDust();
            } else if (this.dogType === 'violet' && !this.hasDoubleJumped) {
                body.setVelocityY(this.stats.jump * 0.85);
                this.hasDoubleJumped = true;
                sfx.play('jump');
            }
        }

        // Ability (Shift or touch)
        const abilityPressed = Phaser.Input.Keyboard.JustDown(this.keys.shift) || touchJustDown.ability;
        if (abilityPressed && this.abilityCooldown <= 0) {
            this.useAbility();
        }

        // Ability cooldown
        if (this.abilityCooldown > 0) {
            this.abilityCooldown -= delta;
            if (this.abilityText) {
                this.abilityText.setColor('#804040');
                this.abilityText.setText(`[SHIFT] ${this.stats.ability} (${Math.ceil(this.abilityCooldown / 1000)}s)`);
            }
        } else if (this.abilityText) {
            this.abilityText.setColor('#80FF80');
            this.abilityText.setText(`[SHIFT] ${this.stats.ability}`);
        }

        // Bark cooldown (Mango passive)
        if (this.barkCooldown > 0) this.barkCooldown -= delta;

        // Violet passive: no fall damage (handled in hurt)
        // Mochi momentum
        if (this.dogType === 'mochi' && onGround && !onIce) {
            body.setVelocityX(body.velocity.x * 0.92);
        }

        // Slam physics
        if (this.isSlamming && onGround) {
            this.isSlamming = false;
            sfx.play('stomp');
            this.cameras.main.shake(150, 0.03);
            // Check cracked floors
            this.crackedGroup.getChildren().forEach(tile => {
                if (Math.abs(this.player.x - tile.x) < TILE_SIZE * 2 && Math.abs(this.player.y - tile.y) < TILE_SIZE * 2) {
                    tile.destroy();
                }
            });
            // Stun nearby enemies
            this.enemies.getChildren().forEach(e => {
                if (Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y) < 60) {
                    e.body.setVelocity(0, -150);
                    e.stunTimer = 1500;
                }
            });
        }

        // Update moving platforms
        this.movingPlatforms.forEach(plat => {
            const mp = plat.mpData;
            plat.mpTimer += delta * 0.001;
            const prevX = plat.x;
            const prevY = plat.y;
            if (mp.dir === 'x') {
                plat.x = plat.startX + Math.sin(plat.mpTimer * (mp.speed || 1)) * (mp.range || 3) * TILE_SIZE;
            } else {
                plat.y = plat.startY + Math.sin(plat.mpTimer * (mp.speed || 1)) * (mp.range || 2) * TILE_SIZE;
            }
            plat.body.updateFromGameObject();
            // Move player with platform if standing on it
            if (this.player.body.blocked.down) {
                const onPlat = Math.abs(this.player.x - plat.x) < (mp.width * TILE_SIZE / 2 + this.stats.width / 2) &&
                               Math.abs(this.player.y + this.stats.height / 2 - plat.y) < 10;
                if (onPlat) {
                    this.player.x += (plat.x - prevX);
                    this.player.y += (plat.y - prevY);
                }
            }
        });

        // Fall death
        if (this.player.y > this.levelData.height * TILE_SIZE + 50) {
            this.hurtPlayer(true);
        }

        // Update enemies
        this.updateEnemies(time, delta);

        // Dust particle cleanup
        this.dustParticles = this.dustParticles.filter(p => {
            if (p.alpha <= 0) { p.destroy(); return false; }
            return true;
        });

        // Auto-scroll for 1-4 with visible dogcatcher chasing
        if (this.worldNum === 1 && this.levelNum === 4) {
            if (this.chaseDelay > 0) {
                this.chaseDelay -= delta;
            } else {
                // Advance the chase boundary
                this.chaseScrollX += 1.0;
                // Camera follows player but can't go behind the chase boundary
                const camX = this.cameras.main.scrollX;
                if (camX < this.chaseScrollX) {
                    this.cameras.main.scrollX = this.chaseScrollX;
                }
            }
            // Position dogcatcher at left edge of screen, running on ground
            if (this.chaserDogcatcher) {
                this.chaserDogcatcher.x = this.chaseScrollX + 40;
                const groundY = 14 * TILE_SIZE;
                this.chaserDogcatcher.y = groundY - 24;
                // Dust trail at dogcatcher's feet
                if (Math.random() < 0.5) {
                    const dustX = this.chaserDogcatcher.x + Phaser.Math.Between(-10, 15);
                    const dustY = groundY - 4;
                    const size = Phaser.Math.Between(4, 8);
                    const dust = this.add.rectangle(dustX, dustY, size, size, 0xC0B090, 0.6);
                    this.tweens.add({
                        targets: dust,
                        x: dustX - Phaser.Math.Between(20, 50),
                        y: dustY - Phaser.Math.Between(5, 20),
                        alpha: 0, scaleX: 2, scaleY: 2,
                        duration: Phaser.Math.Between(400, 700),
                        onComplete: () => dust.destroy()
                    });
                }
            }
            // Kill player if dogcatcher catches them
            if (this.chaseDelay <= 0 && this.player.x < this.chaseScrollX + 70) {
                this.hurtPlayer(true);
            }
        }

        // Touch pause
        if (touchJustDown.pause) this.pauseGame();
    }

    useAbility() {
        sfx.play('ability');

        if (this.dogType === 'mango') {
            // Bark: scares mailmen and bears away, stuns other enemies
            sfx.play('bark');
            this.cameras.main.shake(80, 0.01);
            // Visual bark ring effect
            const ring = this.add.circle(this.player.x, this.player.y, 10, 0xFFFF80, 0.4);
            this.tweens.add({
                targets: ring, scaleX: 8, scaleY: 8, alpha: 0, duration: 400,
                onComplete: () => ring.destroy()
            });
            const barkRange = 120;
            this.enemies.getChildren().forEach(e => {
                if (e.dying || !e.active) return;
                const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y);
                if (dist > barkRange) return;
                if (e.enemyType === 'mailman' || e.enemyType === 'bear') {
                    // Scared! Flee in opposite direction
                    const fleeDir = e.x > this.player.x ? 1 : -1;
                    e.body.setVelocityX(fleeDir * 250);
                    e.body.setVelocityY(-150);
                    e.stunTimer = 2000;
                    e.setTint(0xFFFF80);
                    this.time.delayedCall(2000, () => { if (e.active) e.clearTint(); });
                    this.showFloatingText(e.x, e.y - 20, 'SCARED!', '#FFFF80');
                } else {
                    // Other enemies: brief stun
                    e.stunTimer = 800;
                    e.body.setVelocity(0, 0);
                }
            });
            this.abilityCooldown = 2000;

        } else if (this.dogType === 'violet') {
            // Violet's ability is passive double jump — shift does nothing
            return;

        } else if (this.dogType === 'mochi') {
            // Slam
            if (!this.player.body.blocked.down) {
                this.isSlamming = true;
                this.player.body.setVelocityY(400);
            }
            // Mochi passive: calm cats
            this.enemies.getChildren().forEach(e => {
                if (e.enemyType === 'cat' && !e.calmed &&
                    Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y) < 60) {
                    e.calmed = true;
                    e.setTint(0x80E080); // Friendly color
                    e.body.setImmovable(true);
                    e.body.setVelocity(0, 0);
                    e.body.setAcceleration(0, 0);
                    e.body.setAllowGravity(false);
                    e.body.moves = false; // Fully freeze physics
                    // Sleeping zzZ animation
                    const zzz = this.add.text(e.x + 10, e.y - 15, 'z', {
                        fontSize: '8px', fontFamily: 'monospace', color: '#FFFFFF'
                    });
                    this.tweens.add({
                        targets: zzz, y: e.y - 35, alpha: 0, duration: 1500,
                        repeat: -1, onRepeat: () => { zzz.y = e.y - 15; zzz.alpha = 1; }
                    });
                    const zz2 = this.add.text(e.x + 16, e.y - 10, 'Z', {
                        fontSize: '10px', fontFamily: 'monospace', color: '#FFFFFF'
                    });
                    this.tweens.add({
                        targets: zz2, y: e.y - 30, alpha: 0, duration: 1800, delay: 500,
                        repeat: -1, onRepeat: () => { zz2.y = e.y - 10; zz2.alpha = 1; }
                    });
                }
            });
            this.abilityCooldown = 800;
        }
    }

    updateEnemies(time, delta) {
        this.enemies.getChildren().forEach(enemy => {
            if (!enemy.active) return;

            // Stun timer
            if (enemy.stunTimer > 0) {
                enemy.stunTimer -= delta;
                enemy.setAlpha(0.5 + Math.sin(time * 0.01) * 0.3);
                return;
            }
            enemy.setAlpha(1);

            if (enemy.calmed) return; // Calmed cats don't move

            switch(enemy.enemyType) {
                case 'vacuum':
                    enemy.body.setVelocityX(enemy.patrolDir * 40);
                    enemy.patrolTimer += delta;
                    if (enemy.patrolTimer > 2000) { enemy.patrolDir *= -1; enemy.patrolTimer = 0; }
                    break;

                case 'mailman':
                    enemy.body.setVelocityX(enemy.patrolDir * 30);
                    enemy.patrolTimer += delta;
                    if (enemy.patrolTimer > 3000) { enemy.patrolDir *= -1; enemy.patrolTimer = 0; }
                    enemy.shootTimer += delta;
                    if (enemy.shootTimer > 2000) {
                        this.shootProjectile(enemy);
                        enemy.shootTimer = 0;
                    }
                    break;

                case 'squirrel':
                    // Dart erratically when player is near
                    const distToPlayer = Phaser.Math.Distance.Between(
                        enemy.x, enemy.y, this.player.x, this.player.y
                    );
                    if (distToPlayer < 80) {
                        const dir = enemy.x < this.player.x ? -1 : 1;
                        enemy.body.setVelocityX(dir * 150);
                        if (enemy.body.blocked.down) {
                            enemy.body.setVelocityY(-200);
                        }
                    } else {
                        enemy.body.setVelocityX(enemy.patrolDir * 20);
                        enemy.patrolTimer += delta;
                        if (enemy.patrolTimer > 1500) { enemy.patrolDir *= -1; enemy.patrolTimer = 0; }
                    }
                    break;

                case 'cat':
                    // Patrol slowly, swipe when close
                    enemy.body.setVelocityX(enemy.patrolDir * 25);
                    enemy.patrolTimer += delta;
                    if (enemy.patrolTimer > 2500) { enemy.patrolDir *= -1; enemy.patrolTimer = 0; }
                    break;

                case 'bear':
                    // Aggressive — charges at player when nearby
                    const bearDist = Phaser.Math.Distance.Between(
                        enemy.x, enemy.y, this.player.x, this.player.y
                    );
                    if (bearDist < 150) {
                        // Charge towards player
                        const chargeDir = enemy.x < this.player.x ? 1 : -1;
                        enemy.body.setVelocityX(chargeDir * 100);
                        // Lunge jump if player is above
                        if (this.player.y < enemy.y - 20 && enemy.body.blocked.down) {
                            enemy.body.setVelocityY(-300);
                        }
                    } else {
                        // Patrol slowly when player is far
                        enemy.body.setVelocityX(enemy.patrolDir * 30);
                        enemy.patrolTimer += delta;
                        if (enemy.patrolTimer > 2000) { enemy.patrolDir *= -1; enemy.patrolTimer = 0; }
                    }
                    break;

                case 'sprinkler':
                    // Stationary, periodically shoots water upward that falls as projectiles
                    enemy.body.setVelocityX(0);
                    enemy.shootTimer += delta;
                    if (enemy.shootTimer > 3000) {
                        // Shoot 3 water droplets in an arc
                        for (let a = -1; a <= 1; a++) {
                            const proj = this.projectiles.create(enemy.x + a * 10, enemy.y - 10, 'water_drop');
                            proj.body.setVelocityX(a * 60);
                            proj.body.setVelocityY(-200);
                            proj.body.setAllowGravity(true);
                            proj.body.setGravityY(400);
                            this.time.delayedCall(2000, () => { if (proj.active) proj.destroy(); });
                        }
                        enemy.shootTimer = 0;
                    }
                    break;

                case 'pigeon':
                    // Flies in sine-wave pattern, divebombs when above player
                    enemy.body.setAllowGravity(false);
                    enemy.patrolTimer += delta * 0.001;
                    enemy.body.setVelocityX(enemy.patrolDir * 50);
                    enemy.y = enemy.y + Math.sin(enemy.patrolTimer * 3) * 0.5;
                    // Divebomb if directly above player
                    if (Math.abs(enemy.x - this.player.x) < 30 && enemy.y < this.player.y) {
                        enemy.body.setVelocityY(150);
                    } else {
                        enemy.body.setVelocityY(0);
                    }
                    break;

                case 'porcupine':
                    // Slow patrol, CANNOT be stomped (hurts player on any contact)
                    enemy.body.setVelocityX(enemy.patrolDir * 20);
                    enemy.patrolTimer += delta;
                    if (enemy.patrolTimer > 3000) { enemy.patrolDir *= -1; enemy.patrolTimer = 0; }
                    break;

                case 'boss':
                    this.updateBoss(enemy, time, delta);
                    break;
            }

            // Reverse at walls
            if (enemy.body.blocked.left) enemy.patrolDir = 1;
            if (enemy.body.blocked.right) enemy.patrolDir = -1;
            // Reverse at ledges — check if ground exists ahead
            if (enemy.body.blocked.down && enemy.enemyType !== 'boss') {
                const aheadX = enemy.x + enemy.patrolDir * (enemy.width / 2 + 4);
                const belowY = enemy.y + enemy.height / 2 + 4;
                const tileX = Math.floor(aheadX / TILE_SIZE);
                const tileY = Math.floor(belowY / TILE_SIZE);
                if (tileY >= 0 && tileY < this.levelData.height && tileX >= 0 && tileX < this.levelData.width) {
                    const tileAhead = this.levelData.tiles[tileY][tileX];
                    if (tileAhead === T.EMPTY || tileAhead === T.WATER) {
                        enemy.patrolDir *= -1;
                        enemy.body.setVelocityX(0);
                    }
                } else {
                    enemy.patrolDir *= -1;
                    enemy.body.setVelocityX(0);
                }
            }
            // Flip sprite based on direction
            enemy.setFlipX(enemy.patrolDir < 0);

            // Destroy enemies that fall off the world
            if (enemy.y > this.levelData.height * TILE_SIZE + 100) {
                enemy.destroy();
            }
        });
    }

    updateBoss(boss, time, delta) {
        const dx = this.player.x - boss.x;
        const dir = dx > 0 ? 1 : -1;

        // Speed scales with phase (gentle increase)
        boss.body.setVelocityX(dir * (25 + boss.bossPhase * 10));

        // Shooting — phase 2: single shot, phase 3: double shot
        boss.shootTimer += delta;
        const shootInterval = 3000 - boss.bossPhase * 400;
        if (boss.shootTimer > shootInterval) {
            this.shootProjectile(boss);
            // Phase 3 only: one extra shot with delay
            if (boss.bossPhase >= 3) {
                this.time.delayedCall(300, () => { if (boss.active) this.shootProjectile(boss); });
            }
            boss.shootTimer = 0;
        }

        // Jump towards player
        boss.patrolTimer += delta;
        const jumpInterval = 4000 - boss.bossPhase * 500;
        if (boss.patrolTimer > jumpInterval && boss.body.blocked.down) {
            boss.body.setVelocityY(-320);
            boss.patrolTimer = 0;
            // Phase 3: screen shake on landing
            if (boss.bossPhase >= 3) {
                this.time.delayedCall(600, () => {
                    if (boss.active && boss.body.blocked.down) {
                        this.cameras.main.shake(150, 0.015);
                    }
                });
            }
        }

        // Phase 3: flash red when low HP
        if (boss.bossPhase >= 3 && boss.hp <= 3) {
            boss.setTint(Math.sin(time * 0.01) > 0 ? 0xFF4040 : 0xFFFFFF);
        }

        // Update boss health display
        if (boss.dying) return;
        if (!boss.hpText) {
            boss.hpText = this.add.text(boss.x, boss.y - 30, '', {
                fontSize: '10px', fontFamily: 'monospace', color: '#FF4040'
            }).setOrigin(0.5).setDepth(200);
        }
        boss.hpText.setPosition(boss.x, boss.y - boss.height / 2 - 12);
        boss.hpText.setText('HP: ' + boss.hp + '/' + (boss.bossPhase * 3));
    }

    shootProjectile(enemy) {
        const dir = enemy.x < this.player.x ? 1 : -1;
        const isBoss = enemy.enemyType === 'boss';
        const tex = isBoss ? 'net_proj' : 'letter';
        const speed = isBoss ? 150 : 120;
        const proj = this.projectiles.create(enemy.x + dir * 10, enemy.y - 5, tex);
        proj.body.setVelocityX(dir * speed);
        proj.body.setAllowGravity(false);
        // Nets spin as they fly
        if (isBoss) {
            this.tweens.add({ targets: proj, angle: 360, duration: 600, repeat: -1 });
        }
        this.time.delayedCall(3000, () => { if (proj.active) proj.destroy(); });
    }

    stompEnemy(enemy) {
        if (enemy.calmed || enemy.dying) return;

        sfx.play('stomp');
        this.player.body.setVelocityY(-200); // Bounce
        // Brief invincibility after stomp to prevent double-hit
        this.invincible = true;
        this.time.delayedCall(200, () => { this.invincible = false; });

        if (enemy.enemyType === 'boss') {
            enemy.hp--;
            sfx.play('hurt');
            enemy.setAlpha(0.3);
            this.time.delayedCall(200, () => { if (enemy.active) enemy.setAlpha(1); });
            if (enemy.hp <= 0) {
                this.defeatEnemy(enemy);
            }
        } else {
            this.defeatEnemy(enemy);
        }
    }

    defeatEnemy(enemy) {
        const wasBoss = enemy.enemyType === 'boss';

        // Mark as dying so overlaps are ignored
        enemy.dying = true;
        enemy.body.enable = false;

        if (enemy.hpText) { enemy.hpText.destroy(); enemy.hpText = null; }

        // Flash and destroy
        this.tweens.add({
            targets: enemy, alpha: 0, scaleX: 1.5, scaleY: 0.3,
            duration: 200, onComplete: () => enemy.destroy()
        });

        // Drop a treat
        const treat = this.collectibleGroup.create(enemy.x, enemy.y, 'treat');
        treat.collectType = 'treat';

        // Boss defeated: remove sign, reveal the doghouse
        if (wasBoss) {
            sfx.play('golden');
            this.showFloatingText(enemy.x, enemy.y - 30, 'BOSS DEFEATED!', '#FFD700');
            this.cameras.main.shake(300, 0.02);
            // Remove the boss sign
            if (this.bossSign) {
                this.tweens.add({
                    targets: this.bossSign, alpha: 0, scaleY: 0, duration: 300,
                    onComplete: () => { this.bossSign.destroy(); this.bossSign = null; }
                });
            }
            // Reveal the doghouse with a pop-in effect
            this.doorGroup.getChildren().forEach(door => {
                door.setVisible(true);
                door.body.enable = true;
                door.setScale(0);
                this.tweens.add({
                    targets: door, scaleX: 1, scaleY: 1, duration: 500,
                    ease: 'Back.easeOut'
                });
                this.tweens.add({
                    targets: door, alpha: 0.65, duration: 800,
                    yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
                    delay: 500
                });
            });
        }
    }

    collectItem(item) {
        const type = item.collectType;
        item.destroy();

        switch(type) {
            case 'treat':
                this.treats++;
                this.save.totalTreats++;
                sfx.play('treat');
                this.treatText.setText('' + this.treats);
                // Extra life at 100
                if (this.save.totalTreats % 100 === 0) {
                    this.save.lives = Math.min(this.save.lives + 1, 9);
                    this.livesText.setText('x' + this.save.lives);
                    this.showFloatingText(this.player.x, this.player.y - 20, '1UP!', '#40FF40');
                }
                break;
            case 'squeaky':
                sfx.play('squeaky');
                this.squeakyFound++;
                this.updateSqueakyHUD();
                if (!this.save.squeakyToys.includes(this.levelKey + '-' + this.squeakyFound)) {
                    this.save.squeakyToys.push(this.levelKey + '-' + this.squeakyFound);
                }
                this.showFloatingText(this.player.x, this.player.y - 20,
                    `SQUEAKY TOY! (${this.squeakyFound}/${this.squeakyTotal})`, '#E060A0');
                // Bonus: all squeaky toys found = extra life
                if (this.squeakyFound >= this.squeakyTotal && this.squeakyTotal > 0) {
                    this.time.delayedCall(500, () => {
                        sfx.play('win');
                        this.save.lives = Math.min(this.save.lives + 1, 9);
                        this.livesText.setText('x' + this.save.lives);
                        this.showFloatingText(this.player.x, this.player.y - 30, 'ALL TOYS! +1 LIFE!', '#FF80C0');
                    });
                }
                break;
            case 'golden':
                sfx.play('golden');
                this.goldenFound++;
                this.updateGoldenHUD();
                if (!this.save.goldenTreats.includes(this.levelKey)) {
                    this.save.goldenTreats.push(this.levelKey);
                }
                // Golden treat gives 25 bonus treats
                this.treats += 25;
                this.save.totalTreats += 25;
                this.treatText.setText('' + this.treats);
                this.showFloatingText(this.player.x, this.player.y - 20, 'GOLDEN TREAT! +25', '#FFD700');
                // Big celebration effect
                this.cameras.main.flash(300, 255, 215, 0, false, null, this);

                break;
            case 'water':
                sfx.play('heal');
                this.hp = Math.min(this.hp + 1, this.maxHp);
                this.updateHearts();
                this.showFloatingText(this.player.x, this.player.y - 20, '+1 HP', '#40D0FF');
                break;
        }
    }

    updateSqueakyHUD() {
        if (this.squeakyIcons && this.squeakyFound > 0) {
            const icon = this.squeakyIcons[this.squeakyFound - 1];
            if (icon) {
                icon.setAlpha(1);
                this.tweens.add({ targets: icon, scaleX: 1.3, scaleY: 1.3, duration: 150, yoyo: true });
            }
        }
    }

    updateGoldenHUD() {
        if (this.goldenIcons && this.goldenFound > 0) {
            const icon = this.goldenIcons[this.goldenFound - 1];
            if (icon) {
                icon.setAlpha(1);
                this.tweens.add({ targets: icon, scaleX: 1.5, scaleY: 1.5, duration: 200, yoyo: true });
            }
        }
    }

    showFloatingText(x, y, text, color) {
        const t = this.add.text(x, y, text, {
            fontSize: '12px', fontFamily: 'monospace', color: color
        }).setOrigin(0.5);
        this.tweens.add({
            targets: t, y: y - 30, alpha: 0, duration: 1000,
            onComplete: () => t.destroy()
        });
    }

    hurtPlayer(instant = false) {
        if (this.dead || this.won) return;
        if (this.invincible && !instant) return;

        // Violet passive: survives pit falls with 1 HP damage instead of instant death
        if (instant && this.dogType === 'violet' && this.player.y > this.levelData.height * TILE_SIZE) {
            if (this.hp > 1) {
                this.hp--;
                this.updateHearts();
                this.player.body.setVelocity(0, -300);
                this.player.y = this.levelData.height * TILE_SIZE - TILE_SIZE * 4;
                sfx.play('hurt');
                // Brief invincibility
                this.invincible = true;
                this.tweens.add({
                    targets: this.player, alpha: 0.3, duration: 100,
                    yoyo: true, repeat: 5,
                    onComplete: () => { this.invincible = false; this.player.setAlpha(1); }
                });
                return;
            }
            // At 1 HP or less, die normally — fall through to instant death below
        }

        if (instant) {
            this.hp = 0;
        } else {
            this.hp--;
        }

        sfx.play('hurt');
        this.updateHearts();
        this.cameras.main.shake(150, 0.02);

        if (this.hp <= 0) {
            this.die();
        } else {
            // Invincibility frames
            this.invincible = true;
            this.tweens.add({
                targets: this.player, alpha: 0.3, duration: 100,
                yoyo: true, repeat: 8,
                onComplete: () => { this.invincible = false; this.player.setAlpha(1); }
            });
            // Knockback
            const dir = this.facingRight ? -1 : 1;
            this.player.body.setVelocity(dir * 100, -150);
        }
    }

    updateHearts() {
        this.hearts.forEach((h, i) => {
            h.setTexture(i < this.hp ? 'heart' : 'heart_empty');
        });
    }

    die() {
        this.dead = true;
        sfx.play('death');
        sfx.stopMusic();
        this.player.body.setVelocity(0, -200);
        this.player.body.setAllowGravity(true);

        this.tweens.add({
            targets: this.player, alpha: 0, angle: 360, duration: 800,
            onComplete: () => {
                this.save.lives--;
                saveSave(this.save);
                if (this.save.lives <= 0) {
                    this.scene.start('GameOver', { dog: this.dogType });
                } else {
                    // Restart level
                    this.scene.restart({
                        dog: this.dogType, world: this.worldNum,
                        level: this.levelNum, levelKey: this.levelKey,
                        checkpoint: this.lastCheckpoint
                    });
                }
            }
        });
    }

    winLevel() {
        if (this.won || this.dead) return;
        this.won = true;
        sfx.play('win');
        sfx.stopMusic();

        // Calculate star rating based on time
        const timeSec = Math.floor(this.levelTime / 1000);
        // Thresholds: 3 stars < 30s, 2 stars < 60s, 1 star otherwise
        this.stars = timeSec < 30 ? 3 : timeSec < 60 ? 2 : 1;
        // Bonus star for finding all squeaky toys
        if (this.squeakyFound >= this.squeakyTotal && this.squeakyTotal > 0) {
            this.stars = Math.min(this.stars + 1, 3);
        }

        // Save progress
        if (!this.save.completed[this.dogType].includes(this.levelKey)) {
            this.save.completed[this.dogType].push(this.levelKey);
        }

        // Save star rating (keep best)
        if (!this.save.stars) this.save.stars = {};
        const starKey = this.dogType + '-' + this.levelKey;
        if (!this.save.stars[starKey] || this.stars > this.save.stars[starKey]) {
            this.save.stars[starKey] = this.stars;
        }

        // Unlock next level
        const nextLevel = this.getNextLevelKey();
        if (nextLevel && !this.save.unlockedLevels[this.dogType].includes(nextLevel)) {
            this.save.unlockedLevels[this.dogType].push(nextLevel);
        }
        saveSave(this.save);

        // Victory animation
        this.player.body.setVelocity(0, 0);
        this.player.body.setAllowGravity(false);

        this.showFloatingText(this.player.x, this.player.y - 30, 'LEVEL COMPLETE!', '#FFD700');

        // Dog celebration based on type
        if (this.dogType === 'mango') {
            // Zoomies
            this.tweens.add({
                targets: this.player, x: this.player.x + 20, duration: 150,
                yoyo: true, repeat: 4
            });
        } else if (this.dogType === 'violet') {
            // Twirl
            this.tweens.add({
                targets: this.player, angle: 720, duration: 800
            });
        } else {
            // Mochi shake
            this.tweens.add({
                targets: this.player, scaleX: 1.3, scaleY: 0.7, duration: 100,
                yoyo: true, repeat: 5
            });
        }

        // Show collectible summary
        this.time.delayedCall(1500, () => {
            const sumY = this.player.y - 60;
            const lines = [];
            if (this.treats > 0) lines.push('Treats: ' + this.treats);
            if (this.squeakyFound > 0) lines.push('Toys: ' + this.squeakyFound + '/' + this.squeakyTotal);
            if (this.goldenFound > 0) lines.push('Golden Treat Found!');
            lines.push('\u2605'.repeat(this.stars) + '\u2606'.repeat(3 - this.stars));
            if (lines.length > 0) {
                lines.forEach((line, i) => {
                    const st = this.add.text(this.player.x, sumY + i * 16, line, {
                        fontSize: '11px', fontFamily: 'monospace', color: '#FFFFFF'
                    }).setOrigin(0.5).setDepth(200);
                    this.tweens.add({ targets: st, alpha: 0, y: sumY + i * 16 - 20, delay: 1500, duration: 500 });
                });
            }
        });

        // Fade out and transition
        this.time.delayedCall(3500, () => {
            this.cameras.main.fadeOut(500, 0, 0, 0);
            this.cameras.main.once('camerafadeoutcomplete', () => {
                if (this.worldNum === 4) {
                    this.scene.start('GameOver', { dog: this.dogType, victory: true });
                } else {
                    this.scene.start('WorldMap', { dog: this.dogType });
                }
            });
        });
    }

    getNextLevelKey() {
        const order = ['1-1','1-2','1-3','1-4','2-1','2-2','2-3','2-4','3-1','3-2','3-3','3-4','final'];
        const idx = order.indexOf(this.levelKey);
        return idx < order.length - 1 ? order[idx + 1] : null;
    }

    pauseGame() {
        this.scene.pause();
        this.scene.launch('Pause', { gameScene: this });
    }

    spawnDust() {
        for (let i = 0; i < 5; i++) {
            const p = this.add.rectangle(
                this.player.x + Phaser.Math.Between(-5, 5),
                this.player.y + this.stats.height / 2,
                4, 4, 0xC0B090
            );
            this.tweens.add({
                targets: p, y: p.y + Phaser.Math.Between(-10, -5),
                x: p.x + Phaser.Math.Between(-8, 8),
                alpha: 0, duration: 400,
                onComplete: () => p.destroy()
            });
            this.dustParticles.push(p);
        }
    }

    spawnTrail() {
        if (!this.player || this.dead) return;
        const body = this.player.body;
        if (Math.abs(body.velocity.x) < 30) return; // Only when running

        if (this.dogType === 'mango') {
            // Tiny paw prints
            const p = this.add.circle(
                this.player.x - (this.facingRight ? 6 : -6) + Phaser.Math.Between(-2, 2),
                this.player.y + this.stats.height / 2,
                2, 0xD8C8A0, 0.4
            );
            this.tweens.add({ targets: p, alpha: 0, duration: 600, onComplete: () => p.destroy() });
        } else if (this.dogType === 'violet') {
            // Speed lines
            const lx = this.player.x - (this.facingRight ? 10 : -10);
            const ly = this.player.y + Phaser.Math.Between(-6, 6);
            const line = this.add.rectangle(lx, ly, Phaser.Math.Between(6, 14), 1, 0xC0C0E0, 0.4);
            this.tweens.add({ targets: line, alpha: 0, scaleX: 0, duration: 300, onComplete: () => line.destroy() });
        } else if (this.dogType === 'mochi') {
            // Ground shake dust
            if (body.blocked.down && Math.random() < 0.5) {
                const d = this.add.rectangle(
                    this.player.x + Phaser.Math.Between(-8, 8),
                    this.player.y + this.stats.height / 2,
                    Phaser.Math.Between(3, 6), Phaser.Math.Between(2, 4), 0xA09070, 0.3
                );
                this.tweens.add({ targets: d, y: d.y - Phaser.Math.Between(3, 8), alpha: 0, duration: 400, onComplete: () => d.destroy() });
            }
        }
    }
}

// --- PAUSE SCENE ---
class PauseScene extends Phaser.Scene {
    constructor() { super('Pause'); }
    create(data) {
        this.gameScene = data.gameScene;
        const bg = this.add.rectangle(GAME_WIDTH / 2, GAME_HEIGHT / 2, GAME_WIDTH, GAME_HEIGHT, 0x000000, 0.85);
        const cx = GAME_WIDTH / 2;

        this.add.text(cx, 24, 'PAUSED', {
            fontSize: '28px', fontFamily: 'monospace', color: '#FFFFFF'
        }).setOrigin(0.5);

        // Controls
        this.add.text(cx, 58, 'ESC/P: Resume  |  Q: Quit  |  M: Mute', {
            fontSize: '11px', fontFamily: 'monospace', color: '#A0A0A0'
        }).setOrigin(0.5);

        // === GUIDE — compact two-column layout ===
        const col1x = 30;
        const col2x = cx + 20;
        const spriteX = 16;
        const textX = 36;
        let y1 = 80;
        let y2 = 80;
        const ls = 22;
        const hdr = { fontSize: '10px', fontFamily: 'monospace', color: '#FFD700' };
        const nm = { fontSize: '9px', fontFamily: 'monospace', color: '#FFFFFF' };
        const ds = { fontSize: '7px', fontFamily: 'monospace', color: '#909090' };

        // --- LEFT: Enemies ---
        this.add.text(col1x, y1, 'ENEMIES', hdr);
        y1 += 14;
        [
            ['vacuum', 'Vacuum', 'Patrols. Stomp it!'],
            ['mailman', 'Mailman', 'Throws letters'],
            ['squirrel', 'Squirrel', 'Runs when close'],
            ['cat', 'Cat', 'Mochi calms them'],
            ['bear', 'Bear', 'Charges at you!'],
            ['sprinkler', 'Sprinkler', 'Water arcs'],
            ['pigeon', 'Pigeon', 'Divebombs!'],
            ['porcupine', 'Porcupine', 'Can\'t stomp!'],
            ['boss', 'Dogcatcher', 'BOSS'],
        ].forEach(([tex, name, desc]) => {
            this.add.image(col1x + spriteX, y1 + 6, tex).setScale(0.5);
            this.add.text(col1x + textX, y1, name + ' - ' + desc, ds);
            y1 += ls - 6;
        });

        // --- RIGHT: Dogs + Collectibles ---
        this.add.text(col2x, y2, 'YOUR DOGS  (Shift)', hdr);
        y2 += 14;
        [
            ['mango', 'Mango', 'Bark scares mailmen/bears'],
            ['violet', 'Violet', 'Passive double jump!'],
            ['mochi', 'Mochi', 'Slam floors, calm cats'],
        ].forEach(([tex, name, desc]) => {
            this.add.image(col2x + spriteX, y2 + 8, tex).setScale(1);
            this.add.text(col2x + textX, y2, name, nm);
            this.add.text(col2x + textX, y2 + 11, desc, ds);
            y2 += ls;
        });

        y2 += 2;
        this.add.text(col2x, y2, 'COLLECTIBLES', hdr);
        y2 += 14;
        [
            ['treat', 'Treats', '100 = extra life'],
            ['squeaky', 'Squeaky Toy', '3 per level'],
            ['golden', 'Golden Treat', '+25 treats'],
            ['water_bowl', 'Water Bowl', 'Heals 1 HP'],
        ].forEach(([tex, name, desc]) => {
            this.add.image(col2x + spriteX, y2 + 6, tex).setScale(0.8);
            this.add.text(col2x + textX, y2, name + ' - ' + desc, ds);
            y2 += ls - 6;
        });

        this.input.keyboard.on('keydown-ESC', () => this.resumeGame());
        this.input.keyboard.on('keydown-P', () => this.resumeGame());
        this.input.keyboard.on('keydown-Q', () => this.quitToMap());
        this.input.keyboard.on('keydown-M', () => sfx.toggle());

        // Touch-friendly buttons at the bottom
        const btnY = GAME_HEIGHT - 35;
        const resumeBtn = this.add.text(cx - 150, btnY, '▶ RESUME', {
            fontSize: '16px', fontFamily: 'monospace', color: '#80FF80',
            backgroundColor: 'rgba(80,200,80,0.15)', padding: { x: 14, y: 8 }
        }).setOrigin(0.5).setInteractive();
        resumeBtn.on('pointerdown', () => this.resumeGame());

        const quitBtn = this.add.text(cx, btnY, '✕ QUIT', {
            fontSize: '16px', fontFamily: 'monospace', color: '#FF8080',
            backgroundColor: 'rgba(200,80,80,0.15)', padding: { x: 14, y: 8 }
        }).setOrigin(0.5).setInteractive();
        quitBtn.on('pointerdown', () => this.quitToMap());

        const muteBtn = this.add.text(cx + 150, btnY, '♪ MUTE', {
            fontSize: '16px', fontFamily: 'monospace', color: '#80C0FF',
            backgroundColor: 'rgba(80,120,200,0.15)', padding: { x: 14, y: 8 }
        }).setOrigin(0.5).setInteractive();
        muteBtn.on('pointerdown', () => {
            sfx.toggle();
            muteBtn.setText(sfx.muted ? '♪ UNMUTE' : '♪ MUTE');
        });
    }

    quitToMap() {
        sfx.stopMusic();
        showGameTouchControls(false);
        this.scene.stop('Game');
        this.scene.start('WorldMap', { dog: this.gameScene?.dogType || 'mango' });
    }

    resumeGame() {
        this.scene.resume('Game');
        this.scene.stop();
    }
}

// --- GAME OVER SCENE ---
class GameOverScene extends Phaser.Scene {
    constructor() { super('GameOver'); }
    create(data) {
        showGameTouchControls(false);
        const victory = data.victory;
        this.cameras.main.setBackgroundColor(victory ? '#2A4A6A' : '#2A1A1A');
        const cx = GAME_WIDTH / 2;

        if (victory) {
            this.add.text(cx, 80, 'YOU DID IT!', {
                fontSize: '40px', fontFamily: 'monospace', color: '#FFD700',
                stroke: '#805020', strokeThickness: 4
            }).setOrigin(0.5);

            this.add.text(cx, 140, `${data.dog.charAt(0).toUpperCase() + data.dog.slice(1)} made it home!`, {
                fontSize: '16px', fontFamily: 'monospace', color: '#FFFFFF'
            }).setOrigin(0.5);

            const dogImg = this.add.image(cx, 200, data.dog).setScale(3);
            this.tweens.add({ targets: dogImg, y: 195, duration: 400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

            const save = loadSave();
            const lines = [
                `Total Treats: ${save.totalTreats}`,
                `Squeaky Toys: ${save.squeakyToys.length}/13`,
                `Golden Treats: ${save.goldenTreats.length}/13`,
            ];
            lines.forEach((l, i) => {
                this.add.text(cx, 250 + i * 28, l, {
                    fontSize: '14px', fontFamily: 'monospace', color: '#C0C0D0'
                }).setOrigin(0.5);
            });

            let allComplete = true;
            ['mango', 'violet', 'mochi'].forEach(dog => {
                if ((save.completed[dog] || []).length < 13) allComplete = false;
            });
            if (allComplete && save.goldenTreats.length >= 13 && save.squeakyToys.length >= 13) {
                this.add.text(cx, 300, '100% COMPLETE! GOOD DOG!!!', {
                    fontSize: '20px', fontFamily: 'monospace', color: '#FFD700'
                }).setOrigin(0.5);
            }
        } else {
            this.add.text(cx, 140, 'GAME OVER', {
                fontSize: '40px', fontFamily: 'monospace', color: '#E03030'
            }).setOrigin(0.5);

            this.add.text(cx, 200, 'No more lives...', {
                fontSize: '16px', fontFamily: 'monospace', color: '#C0C0C0'
            }).setOrigin(0.5);

            const deadDog = this.add.image(cx, 260, data.dog).setScale(3).setAngle(90).setAlpha(0.5);

            const save = loadSave();
            if (save.hardcore) {
                // Hardcore: wipe all progress
                this.add.text(cx, 240, 'HARDCORE MODE — All progress lost!', {
                    fontSize: '12px', fontFamily: 'monospace', color: '#E06060'
                }).setOrigin(0.5);
                const fresh = defaultSave();
                fresh.hardcore = true; // keep hardcore enabled
                saveSave(fresh);
            } else {
                // Normal: just reset lives, keep progress
                this.add.text(cx, 240, 'Lives restored. Your progress is safe.', {
                    fontSize: '12px', fontFamily: 'monospace', color: '#80C080'
                }).setOrigin(0.5);
                save.lives = MAX_LIVES;
                saveSave(save);
            }
        }

        this.add.text(cx, 370, 'Press ENTER to continue', {
            fontSize: '16px', fontFamily: 'monospace', color: '#FFFFFF'
        }).setOrigin(0.5);

        this.input.keyboard.on('keydown-ENTER', () => this.scene.start('Title'));
        this.input.keyboard.on('keydown-SPACE', () => this.scene.start('Title'));
        this.input.on('pointerdown', () => this.scene.start('Title'));
    }
}

// ============================================================
// SECTION 8: GAME INIT
// ============================================================
const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    width: GAME_WIDTH,
    height: GAME_HEIGHT,
    pixelArt: true,
    backgroundColor: PAL.SKY,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 0 },
            debug: false
        }
    },
    scene: [BootScene, TitleScene, CharacterSelectScene, WorldMapScene, GameScene, PauseScene, GameOverScene]
};

const game = new Phaser.Game(config);
</script>
