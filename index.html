<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; width: 100vw; height: 100vh; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
#game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
/* Touch controls — hidden on desktop, shown on touch devices */
#touch-zone { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 999; pointer-events: none; }
#joystick-area { position: absolute; left: 0; top: 0; width: 45%; height: 100%; pointer-events: auto; }
#joystick-base { display: none; position: absolute; width: 100px; height: 100px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2); pointer-events: none; }

  background: rgba(255,255,255,0.35); pointer-events: none; }
.touch-btn { pointer-events: auto; position: absolute; border: none; border-radius: 50%;
  font-size: 18px; font-family: monospace; font-weight: bold; color: #fff; opacity: 0.4;
  display: flex; align-items: center; justify-content: center;
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

#btn-jump { right: 100px; bottom: 30px; width: 90px; height: 90px; background: rgba(80,200,80,0.25); }
#btn-ability { right: 14px; bottom: 50px; width: 76px; height: 76px; background: rgba(200,80,80,0.25); }

  position: fixed; z-index: 1001; display: none; border: none; border-radius: 50%;

  position: fixed; z-index: 1001; display: none; border: none; border-radius: 8px;

  -webkit-user-select: none; user-select: none; }
/* Pause overlay touch buttons */
.pause-touch-btn { display: inline-block; padding: 12px 28px; margin: 8px; border: 2px solid rgba(255,255,255,0.4);

<script>
// Touch input state
const touchInput = { left: false, right: false, up: false, down: false, jump: false, ability: false, pause: false };

// Haptic feedback helper
function haptic(ms) {
    try { if (navigator.vibrate) navigator.vibrate(ms || 10); } catch(e) {}
}

// === FLOATING JOYSTICK ===
const joyArea = document.getElementById('joystick-area');
const joyBase = document.getElementById('joystick-base');
const joyThumb = document.getElementById('joystick-thumb');
let joyActive = false;
let joyOriginX = 0, joyOriginY = 0;
const joyDeadzone = 15; // pixels before registering input
const joyMaxDist = 45;  // max thumb travel from center

function updateJoystick(clientX, clientY) {
    const dx = clientX - joyOriginX;
    const dy = clientY - joyOriginY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const clampDist = Math.min(dist, joyMaxDist);
    const angle = Math.atan2(dy, dx);
    const thumbX = joyOriginX + Math.cos(angle) * clampDist;
    const thumbY = joyOriginY + Math.sin(angle) * clampDist;
    joyThumb.style.left = (thumbX - 22) + 'px';
    joyThumb.style.top = (thumbY - 22) + 'px';

    if (dist > joyDeadzone) {
        touchInput.left = dx < -joyDeadzone;
        touchInput.right = dx > joyDeadzone;
        touchInput.up = dy < -joyDeadzone;
        touchInput.down = dy > joyDeadzone;
    } else {
        touchInput.left = touchInput.right = touchInput.up = touchInput.down = false;
    }
}

joyArea.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joyActive = true;
    joyOriginX = t.clientX;
    joyOriginY = t.clientY;
    // Show joystick at touch position
    joyBase.style.display = 'block';
    joyBase.style.left = (joyOriginX - 50) + 'px';
    joyBase.style.top = (joyOriginY - 50) + 'px';
    joyThumb.style.display = 'block';
    joyThumb.style.left = (joyOriginX - 22) + 'px';
    joyThumb.style.top = (joyOriginY - 22) + 'px';
    haptic(5);
}, { passive: false });

joyArea.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!joyActive) return;
    const t = e.changedTouches[0];
    updateJoystick(t.clientX, t.clientY);
}, { passive: false });

joyArea.addEventListener('touchend', (e) => {
    e.preventDefault();
    joyActive = false;
    joyBase.style.display = 'none';
    joyThumb.style.display = 'none';
    touchInput.left = touchInput.right = touchInput.up = touchInput.down = false;
}, { passive: false });

joyArea.addEventListener('touchcancel', (e) => {
    joyActive = false;
    joyBase.style.display = 'none';
    joyThumb.style.display = 'none';
    touchInput.left = touchInput.right = touchInput.up = touchInput.down = false;
}, { passive: false });

// === ACTION BUTTONS ===
function bindActionBtn(id, key) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', (e) => {
        e.preventDefault(); touchInput[key] = true; haptic(8);
    }, { passive: false });
    el.addEventListener('touchend', (e) => {
        e.preventDefault(); touchInput[key] = false;
    }, { passive: false });
    el.addEventListener('touchcancel', (e) => {
        e.preventDefault(); touchInput[key] = false;
    }, { passive: false });
}
bindActionBtn('btn-jump', 'jump');
bindActionBtn('btn-ability', 'ability');

// Pause button
const pauseBtn = document.getElementById('btn-pause');
if (pauseBtn) {
    pauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); touchInput.pause = true; haptic(5); }, { passive: false });
    pauseBtn.addEventListener('touchend', (e) => { e.preventDefault(); touchInput.pause = false; }, { passive: false });
}

// Track press edges for JustDown behavior
const touchJustDown = { jump: false, ability: false, pause: false };
const touchPrev = { jump: false, ability: false, pause: false };
function updateTouchEdges() {
    ['jump', 'ability', 'pause'].forEach(k => {
        touchJustDown[k] = touchInput[k] && !touchPrev[k];
        touchPrev[k] = touchInput[k];
    });
}

// Fullscreen toggle
const fsBtn = document.getElementById('btn-fullscreen');
if (fsBtn) {
    fsBtn.addEventListener('click', () => {
        const el = document.documentElement;
        try {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            } else if (el.requestFullscreen) {
                el.requestFullscreen();
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            } else {
                // iOS Safari: no fullscreen API — scroll to hide address bar
                window.scrollTo(0, 1);
            }
        } catch(e) {
            window.scrollTo(0, 1);
        }
    });
}

// Show/hide game touch controls (joystick + action buttons) based on active scene
// Called by game scenes to enable controls only during gameplay
function showGameTouchControls(show) {
    const tz = document.getElementById('touch-zone');
    const pp = document.getElementById('btn-pause');
    if (!tz) return;
    const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    if (!isTouchDevice) return;
    tz.style.display = show ? 'block' : 'none';
    if (pp) pp.style.display = show ? 'block' : 'none';
}

<script>
// ============================================================
// SECTION 1: CONSTANTS & CONFIG
// ============================================================
const VERSION = '1.0.0';
const TILE_SIZE = 24;
const GAME_WIDTH = 640;
const GAME_HEIGHT = 432;
const GRAVITY = 1000;
const MAX_LIVES = 3;

// Tile indices
const T = {
    EMPTY: 0, GROUND: 1, GRASS: 2, BRICK: 3, DIRT: 4, DIRT_SOFT: 5,
    PLATFORM: 6, SPIKE: 7, WATER: 8, ICE: 9, CRACKED: 10, BARRIER: 11,
    FENCE: 12, HYDRANT: 13, TREE_TRUNK: 14, TREE_TOP: 15, DOOR: 16,
    BRIDGE: 17, CAVE_WALL: 18, CAVE_BG: 19
};

// Color palettes
const PAL = {
    // Dogs
    MANGO: { body: '#F0E0B8', dark: '#D8C8A0', light: '#FFF0D8', eye: '#2C1810', nose: '#1A0F0A', collar: '#E03030' },
    VIOLET: { body: '#9898A8', dark: '#707888', light: '#C0C0D0', eye: '#2C1830', nose: '#383040', collar: '#6030C0' },
    MOCHI: { body: '#D07030', dark: '#B05820', light: '#F0E8D8', eye: '#1A1810', nose: '#100A08', collar: '#3080E0', patch: '#F8F0E8' },
    // World
    SKY: '#87CEEB', GROUND_TOP: '#4A8C38', GROUND: '#6B4830', BRICK: '#C08060',
    DIRT: '#8B6840', DIRT_SOFT: '#A08050', WATER: '#4080D0', ICE: '#C0E8F8',
    SPIKE: '#808080', FENCE: '#C8B898', HYDRANT: '#D03030', DOOR: '#805020',
    CAVE: '#3A3A4A', CAVE_LIGHT: '#5A5A6A',
    // UI
    HEART: '#E03030', HEART_EMPTY: '#404040', TREAT: '#F0D878', TOY: '#E060A0', GOLD: '#FFD700'
};

// Dog stats
const DOG_STATS = {
    mango:  { speed: 200, jump: -380, health: 2, width: 18, height: 21, ability: 'bark',  cooldown: 2000 },
    violet: { speed: 170, jump: -440, health: 2, width: 21, height: 27, ability: 'double jump', cooldown: 0 },
    mochi:  { speed: 130, jump: -400, health: 4, width: 27, height: 24, ability: 'slam',  cooldown: 800 }
};

// Save key
const SAVE_KEY = 'doggie_game_save';

// ============================================================
// SECTION 2: SPRITE DATA (pixel arrays)
// ============================================================
// Each sprite is a 2D array of hex color strings, '0' = transparent
// Using shorthand color codes for compactness

// Tile pixel data (16x16 each)
function getTileColor(tileId, x, y) {
    switch(tileId) {
        case T.GROUND:
            return y < 3 ? PAL.GROUND_TOP : PAL.GROUND;
        case T.GRASS:
            if (y === 0) return (x + y) % 3 === 0 ? '#5CA048' : PAL.GROUND_TOP;
            return y < 4 ? PAL.GROUND_TOP : PAL.GROUND;
        case T.BRICK:
            if (y % 8 === 0 || (y < 8 ? x % 8 === 0 : (x + 4) % 8 === 0)) return '#A06840';
            return PAL.BRICK;
        case T.DIRT: return (x + y) % 7 === 0 ? '#7A5830' : PAL.DIRT;
        case T.DIRT_SOFT: return (x + y) % 5 === 0 ? '#B89060' : PAL.DIRT_SOFT;
        case T.PLATFORM:
            if (y < 3) return '#806040';
            if (y < 5) return '#604830';
            return null;
        case T.SPIKE:
            if (y > 12 - Math.abs(x - 8)) return PAL.SPIKE;
            return null;
        case T.WATER:
            return y < 3 ? '#60A0E0' : (x + y) % 4 === 0 ? '#3070B0' : PAL.WATER;
        case T.ICE: return (x + y) % 6 === 0 ? '#E0F0FF' : PAL.ICE;
        case T.CRACKED:
            if ((x === 4 && y > 2 && y < 13) || (x === 11 && y > 4 && y < 11)) return '#604830';
            return PAL.BRICK;
        case T.BARRIER:
            return (x + y) % 3 === 0 ? '#C0C0C0' : '#A0A0A0';
        case T.FENCE:
            if (x === 2 || x === 13) return PAL.FENCE;
            if (y === 3 || y === 9) return PAL.FENCE;
            return null;
        case T.HYDRANT:
            if (y < 4) return null;
            if (x > 4 && x < 12) return PAL.HYDRANT;
            if (y > 6 && y < 10 && (x > 2 && x < 14)) return '#B02020';
            return null;
        case T.DOOR:
            if (x === 0 || x === 15 || y === 0) return '#603018';
            if (x === 7 && y > 8 && y < 13) return '#FFD700';
            return PAL.DOOR;
        case T.BRIDGE:
            if (y < 4) return '#806040';
            if (y < 6) return '#604020';
            return null;
        case T.CAVE_WALL: return (x * y) % 7 === 0 ? PAL.CAVE_LIGHT : PAL.CAVE;
        case T.CAVE_BG: return null;
        default: return null;
    }
}

// Enemy sprite colors
const ENEMY_COLORS = {
    vacuum: { body: '#606060', detail: '#404040', light: '#E03030' },
    mailman: { body: '#4060A0', pants: '#404860', skin: '#E0B890', bag: '#806030' },
    squirrel: { body: '#A06030', belly: '#E0C890', eye: '#101010', tail: '#804820' },
    cat: { body: '#404040', stripe: '#606060', eye: '#40C040', nose: '#E08080' },
    bear: { body: '#5A3A20', dark: '#3A2010', belly: '#8A6A40', eye: '#101010', nose: '#1A1008' },
    sprinkler: { body: '#4080D0', pipe: '#808080', water: '#60C0FF' },
    pigeon: { body: '#808890', wing: '#A0A8B0', beak: '#E0A020', eye: '#101010' },
    porcupine: { body: '#6A5030', quill: '#E0D0A0', nose: '#1A1008', belly: '#A08860' }
};

// ============================================================
// SECTION 3: LEVEL DATA
// ============================================================
// Levels are defined as 2D tile arrays + metadata
// Each level: { width, height, tiles[][], spawns: {player, enemies[], collectibles[]} }

function createLevel(worldNum, levelNum) {
    // Boss levels stay 50, chase is 80, regular levels are 100
    const isBossLevel = levelNum === 4;
    const isChase = worldNum === 1 && levelNum === 4;
    const W = isChase ? 80 : isBossLevel ? 50 : 100;
    const H = 17; // tiles high (272px)
    const tiles = [];
    for (let y = 0; y < H; y++) {
        tiles[y] = [];
        for (let x = 0; x < W; x++) {
            tiles[y][x] = T.EMPTY;
        }
    }

    const doorX = isBossLevel ? 47 : isChase ? 77 : 97;
    const spawns = { player: { x: 2, y: 12 }, enemies: [], collectibles: [], door: { x: doorX, y: 12 }, movingPlatforms: [], checkpoints: [] };

    // Ground baseline
    function fillGround(startX, endX, groundY = 14) {
        for (let x = startX; x <= endX; x++) {
            tiles[groundY][x] = T.GRASS;
            for (let y = groundY + 1; y < H; y++) {
                tiles[y][x] = T.GROUND;
            }
        }
    }

    function addPlatform(px, py, len, type = T.PLATFORM) {
        for (let x = px; x < px + len; x++) tiles[py][x] = type;
    }

    function addTreats(px, py, count, spacing = 1) {
        for (let i = 0; i < count; i++) {
            spawns.collectibles.push({ type: 'treat', x: px + i * spacing, y: py });
        }
    }

    if (worldNum === 1 && levelNum === 1) {
        // 1-1: The Front Yard (tutorial)
        fillGround(0, 99);
        // Small gaps and platforms
        for (let x = 18; x <= 20; x++) { tiles[14][x] = T.EMPTY; tiles[15][x] = T.EMPTY; tiles[16][x] = T.EMPTY; }
        addPlatform(16, 11, 3);
        addPlatform(22, 11, 3);
        addPlatform(28, 11, 4);
        addPlatform(35, 11, 3);
        // Fences
        tiles[13][5] = T.FENCE; tiles[13][6] = T.FENCE;
        tiles[13][40] = T.FENCE; tiles[13][41] = T.FENCE;
        // Hydrant
        tiles[13][10] = T.HYDRANT;
        // Door at end
        tiles[12][97] = T.DOOR; tiles[13][97] = T.DOOR;
        // Enemies
        spawns.enemies.push({ type: 'vacuum', x: 15, y: 13 });
        spawns.enemies.push({ type: 'vacuum', x: 30, y: 13 });
        spawns.enemies.push({ type: 'mailman', x: 38, y: 13 });
        // Collectibles
        addTreats(7, 13, 3);   // x=7,8,9 (stop before hydrant at x=10)
        addTreats(11, 13, 2);  // x=11,12 (after hydrant)
        addTreats(14, 13, 3);
        addTreats(29, 13, 3);
        spawns.collectibles.push({ type: 'squeaky', x: 17, y: 10 });  // on platform y=11
        spawns.collectibles.push({ type: 'squeaky', x: 23, y: 10 }); // on platform y=11
        spawns.collectibles.push({ type: 'squeaky', x: 36, y: 10 }); // on platform y=11
        spawns.collectibles.push({ type: 'water', x: 29, y: 10 });   // on platform y=11
        spawns.collectibles.push({ type: 'golden', x: 35, y: 10 });  // on platform y=11
        // Soft dirt for Mango
        tiles[14][25] = T.DIRT_SOFT; tiles[15][25] = T.DIRT_SOFT;
        // === SECOND HALF (x=50-97) ===
        // Pits
        for (let x = 58; x <= 60; x++) { tiles[14][x] = T.EMPTY; tiles[15][x] = T.EMPTY; tiles[16][x] = T.EMPTY; }
        for (let x = 75; x <= 78; x++) { tiles[14][x] = T.EMPTY; tiles[15][x] = T.EMPTY; tiles[16][x] = T.EMPTY; }
        // Platforms
        addPlatform(55, 11, 4); addPlatform(62, 11, 3); addPlatform(68, 9, 4);
        addPlatform(72, 11, 3); addPlatform(80, 11, 4); addPlatform(85, 9, 3);
        addPlatform(90, 11, 4);
        // Fences
        tiles[13][55] = T.FENCE; tiles[13][56] = T.FENCE;
        tiles[13][88] = T.FENCE; tiles[13][89] = T.FENCE;
        // Enemies
        spawns.enemies.push({ type: 'vacuum', x: 65, y: 13 });
        spawns.enemies.push({ type: 'mailman', x: 73, y: 13 });
        spawns.enemies.push({ type: 'sprinkler', x: 82, y: 13 });
        spawns.enemies.push({ type: 'vacuum', x: 92, y: 13 });
        // Treats
        addTreats(52, 13, 5); addTreats(63, 13, 4); addTreats(81, 13, 1); addTreats(83, 13, 2);
        // Collectibles on platforms
        spawns.collectibles.push({ type: 'squeaky', x: 69, y: 8 });
        spawns.collectibles.push({ type: 'water', x: 56, y: 10 });
        spawns.collectibles.push({ type: 'squeaky', x: 86, y: 8 });
        // Checkpoint
        spawns.checkpoints.push({ x: 52, y: 13 });
    } else if (worldNum === 1 && levelNum === 2) {
        // 1-2: Sidewalk Scramble
        fillGround(0, 99);
        for (let x = 12; x <= 14; x++) { tiles[14][x] = T.EMPTY; tiles[15][x] = T.EMPTY; tiles[16][x] = T.EMPTY; }
        for (let x = 30; x <= 33; x++) { tiles[14][x] = T.EMPTY; tiles[15][x] = T.EMPTY; tiles[16][x] = T.EMPTY; }
        addPlatform(10, 11, 4);
        addPlatform(16, 11, 3);
        addPlatform(20, 11, 5);
        addPlatform(34, 11, 3);
        addPlatform(40, 10, 4);
        tiles[12][97] = T.DOOR; tiles[13][97] = T.DOOR;
        spawns.enemies.push({ type: 'vacuum', x: 8, y: 13 });
        spawns.enemies.push({ type: 'mailman', x: 18, y: 13 });
        spawns.enemies.push({ type: 'vacuum', x: 25, y: 13 });
        spawns.enemies.push({ type: 'mailman', x: 37, y: 13 });
        spawns.enemies.push({ type: 'sprinkler', x: 22, y: 13 });
        addTreats(5, 13, 4); addTreats(21, 13, 1); addTreats(23, 13, 2); addTreats(41, 13, 3);
        spawns.collectibles.push({ type: 'squeaky', x: 42, y: 9 });
        spawns.collectibles.push({ type: 'squeaky', x: 13, y: 10 });
        spawns.collectibles.push({ type: 'squeaky', x: 35, y: 10 });
        spawns.collectibles.push({ type: 'golden', x: 22, y: 10 });
        spawns.collectibles.push({ type: 'water', x: 37, y: 10 });
        tiles[14][15] = T.BARRIER; tiles[14][16] = T.BARRIER;
        // === SECOND HALF (x=50-97) ===
        for (let x = 60; x <= 63; x++) { tiles[14][x] = T.EMPTY; tiles[15][x] = T.EMPTY; tiles[16][x] = T.EMPTY; }
        for (let x = 80; x <= 82; x++) { tiles[14][x] = T.EMPTY; tiles[15][x] = T.EMPTY; tiles[16][x] = T.EMPTY; }
        addPlatform(55, 11, 4); addPlatform(64, 11, 3); addPlatform(70, 9, 4);
        addPlatform(76, 11, 4); addPlatform(83, 11, 3); addPlatform(88, 10, 4);
        addPlatform(93, 11, 3);
        tiles[14][68] = T.BARRIER; tiles[14][69] = T.BARRIER;
        spawns.enemies.push({ type: 'vacuum', x: 57, y: 13 });
        spawns.enemies.push({ type: 'mailman', x: 72, y: 13 });
        spawns.enemies.push({ type: 'sprinkler', x: 85, y: 13 });
        spawns.enemies.push({ type: 'vacuum', x: 94, y: 13 });
        addTreats(52, 13, 5); addTreats(66, 13, 4); addTreats(84, 13, 1); addTreats(86, 13, 2);
        spawns.collectibles.push({ type: 'squeaky', x: 71, y: 8 });
        spawns.collectibles.push({ type: 'water', x: 77, y: 10 });
        spawns.checkpoints.push({ x: 52, y: 13 });
    } else if (worldNum === 1 && levelNum === 3) {
        // 1-3: The Dog Park (vertical platforming)
        fillGround(0, 99);
        addPlatform(5, 11, 3); addPlatform(10, 10, 3); addPlatform(15, 8, 3);
        addPlatform(20, 6, 4); addPlatform(26, 8, 3); addPlatform(30, 10, 3);
        addPlatform(35, 7, 4); addPlatform(40, 9, 3); addPlatform(44, 11, 3);
        tiles[12][97] = T.DOOR; tiles[13][97] = T.DOOR;
        spawns.enemies.push({ type: 'squirrel', x: 12, y: 9 });
        spawns.enemies.push({ type: 'squirrel', x: 22, y: 5 });
        spawns.enemies.push({ type: 'squirrel', x: 36, y: 6 });
        spawns.enemies.push({ type: 'vacuum', x: 32, y: 13 });

class SoundManager {
    constructor() {
        this.ctx = null;
        this.muted = false;
        this.musicGain = null;
        this.musicOsc = null;
    }

    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.musicGain = this.ctx.createGain();
            this.musicGain.gain.value = 0.18;
            this.musicGain.connect(this.ctx.destination);
        } catch(e) { console.warn('No audio'); }
    }

    resume() {
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }

    toggle() {
        this.muted = !this.muted;
        if (this.musicGain) this.musicGain.gain.value = this.muted ? 0 : 0.18;
    }

    play(type) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        gain.connect(this.ctx.destination);
        osc.connect(gain);

        switch(type) {
            case 'jump':
                osc.type = 'square'; osc.frequency.setValueAtTime(200, t);
                osc.frequency.linearRampToValueAtTime(600, t + 0.1);
                gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.15);
                osc.start(t); osc.stop(t + 0.15); break;
            case 'treat':
                osc.type = 'square'; osc.frequency.setValueAtTime(800, t);
                osc.frequency.setValueAtTime(1000, t + 0.05);
                gain.gain.setValueAtTime(0.015, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
                osc.start(t); osc.stop(t + 0.1); break;
            case 'hurt':
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, t);
                osc.frequency.linearRampToValueAtTime(100, t + 0.3);
                gain.gain.setValueAtTime(0.03, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
                osc.start(t); osc.stop(t + 0.3); break;
            case 'stomp':
                osc.type = 'square'; osc.frequency.setValueAtTime(400, t);
                osc.frequency.linearRampToValueAtTime(100, t + 0.15);
                gain.gain.setValueAtTime(0.025, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
                osc.start(t); osc.stop(t + 0.2); break;
            case 'ability':
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t);
                osc.frequency.linearRampToValueAtTime(800, t + 0.1);
                osc.frequency.linearRampToValueAtTime(600, t + 0.2);
                gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.25);
                osc.start(t); osc.stop(t + 0.25); break;
            case 'squeaky':
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t);
                osc.frequency.linearRampToValueAtTime(800, t + 0.08);
                osc.frequency.linearRampToValueAtTime(1400, t + 0.15);
                gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
                osc.start(t); osc.stop(t + 0.2); break;
            case 'golden':
                osc.type = 'sine';
                [523, 659, 784, 1047].forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, t + i * 0.1);
                });
                gain.gain.setValueAtTime(0.025, t); gain.gain.linearRampToValueAtTime(0, t + 0.5);
                osc.start(t); osc.stop(t + 0.5); break;
            case 'heal':
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, t);
                osc.frequency.linearRampToValueAtTime(700, t + 0.2);
                gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
                osc.start(t); osc.stop(t + 0.3); break;
            case 'death':
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t);
                osc.frequency.linearRampToValueAtTime(50, t + 0.8);
                gain.gain.setValueAtTime(0.03, t); gain.gain.linearRampToValueAtTime(0, t + 1);
                osc.start(t); osc.stop(t + 1); break;
            case 'win':
                osc.type = 'square';
                [523, 659, 784, 1047, 784, 1047].forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, t + i * 0.12);
                });
                gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.8);
                osc.start(t); osc.stop(t + 0.8); break;
            case 'bark':
                osc.type = 'square'; osc.frequency.setValueAtTime(300, t);
                osc.frequency.setValueAtTime(350, t + 0.05);
                osc.frequency.linearRampToValueAtTime(200, t + 0.1);
                gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.12);
                osc.start(t); osc.stop(t + 0.12); break;
            case 'select':
                osc.type = 'square'; osc.frequency.setValueAtTime(440, t);
                osc.frequency.setValueAtTime(550, t + 0.05);
                gain.gain.setValueAtTime(0.015, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
                osc.start(t); osc.stop(t + 0.1); break;
            default:
                osc.type = 'square'; osc.frequency.setValueAtTime(440, t);
                gain.gain.setValueAtTime(0.015, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
        }
    }

    // Play a note with smooth attack/release envelope
    _note(freq, type, vol, start, dur, dest) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(dest || this.musicGain);
        const atk = Math.min(0.03, dur * 0.1);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(vol, start + atk);
        gain.gain.setValueAtTime(vol * 0.8, start + dur * 0.5);
        gain.gain.linearRampToValueAtTime(0, start + dur);
        osc.start(start);
        osc.stop(start + dur + 0.05);
    }

    // Noise hit for percussion
    _perc(vol, start, dur) {
        if (!this.ctx) return;
        const bufSize = this.ctx.sampleRate * dur;
        const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
        const src = this.ctx.createBufferSource();
        src.buffer = buf;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, start);
        gain.gain.linearRampToValueAtTime(0, start + dur);
        // Bandpass for different drum sounds
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 800;
        filter.Q.value = 1;
        src.connect(filter);
        filter.connect(gain);
        gain.connect(this.musicGain);
        src.start(start);
        src.stop(start + dur + 0.01);
    }

    // Kick drum using oscillator
    _kick(vol, start) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, start);
        osc.frequency.exponentialRampToValueAtTime(40, start + 0.12);
        osc.connect(gain);
        gain.connect(this.musicGain);
        gain.gain.setValueAtTime(vol, start);
        gain.gain.linearRampToValueAtTime(0, start + 0.15);
        osc.start(start);
        osc.stop(start + 0.2);
    }

    // Play a chord (multiple notes at once)

        freqs.forEach(f => this._note(f, type, vol / freqs.length, start, dur));

              melType, ctrType, melVol, ctrVol, bassVol, padVol, kickVol, hatVol) {
        const loopLen = loopBeats * B;

        const scheduleLoop = () => {
            if (this.muted || !this.musicGain || this._musicStopped) return;
            const now = this.ctx.currentTime;

            melody.forEach(([beat, freq, dur]) => {
                this._note(freq, melType, melVol, now + beat * B, dur * B);
            });
            counter.forEach(([beat, freq, dur]) => {
                this._note(freq, ctrType, ctrVol, now + beat * B, dur * B);
            });
            bass.forEach(([beat, freq, dur]) => {
                this._note(freq, 'triangle', bassVol, now + beat * B, dur * B);
            });
            pads.forEach(([beat, freqs, dur]) => {
                this._chord(freqs, 'sine', padVol, now + beat * B, dur * B);
            });
            kicks.forEach(beat => {
                this._kick(kickVol, now + beat * B);
            });
            hats.forEach(beat => {
                this._perc(hatVol, now + beat * B, 0.06);
            });
        };

        this._musicStopped = false;
        scheduleLoop();
        this._musicInterval = setInterval(scheduleLoop, loopLen * 1000);
    }

    stopMusic() {
        this._musicStopped = true;
        if (this._musicInterval) { clearInterval(this._musicInterval); this._musicInterval = null; }
        // Kill all currently playing music by disconnecting and recreating the gain node
        if (this.musicGain && this.ctx) {
            this.musicGain.disconnect();
            this.musicGain = this.ctx.createGain();
            this.musicGain.gain.value = this.muted ? 0 : 0.18;
            this.musicGain.connect(this.ctx.destination);
        }
    }

function generateTextures(scene) {
    // Generate tile spritesheet
    const tileCanvas = scene.textures.createCanvas('tiles', TILE_SIZE * 20, TILE_SIZE);
    const tileCtx = tileCanvas.context;
    for (let id = 1; id <= 19; id++) {
        for (let y = 0; y < TILE_SIZE; y++) {
            for (let x = 0; x < TILE_SIZE; x++) {
                const c = getTileColor(id, x, y);
                if (c) {
                    tileCtx.fillStyle = c;
                    tileCtx.fillRect(id * TILE_SIZE + x, y, 1, 1);
                }
            }
        }
    }
    tileCanvas.refresh();

    // Generate dog textures at higher resolution
    ['mango', 'violet', 'mochi'].forEach(dog => {
        const pal = PAL[dog.toUpperCase()];
        const stats = DOG_STATS[dog];
        const w = stats.width;
        const h = stats.height;
        const canvas = scene.textures.createCanvas(dog, w, h);
        const ctx = canvas.context;
        const bc = pal.body, dc = pal.dark, lc = pal.light, ec = pal.eye, cc = pal.collar;

        if (dog === 'mango') {
            // 18x21 cream terrier — round body, pointy ears, curly tail
            // Body
            ctx.fillStyle = bc;
            ctx.fillRect(3, 7, 12, 8);   // torso
            ctx.fillRect(5, 6, 8, 2);    // upper torso
            // Head
            ctx.fillRect(2, 2, 10, 7);
            ctx.fillRect(3, 1, 8, 2);
            // Lighter belly
            ctx.fillStyle = lc;
            ctx.fillRect(5, 11, 8, 3);
            // Ears (darker, pointy)
            ctx.fillStyle = dc;
            ctx.fillRect(2, 0, 3, 3);
            ctx.fillRect(9, 0, 3, 3);
            // Eyes
            ctx.fillStyle = ec;
            ctx.fillRect(4, 4, 2, 2);
            ctx.fillRect(8, 4, 2, 2);
            // Eye shine
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(4, 4, 1, 1);
            ctx.fillRect(8, 4, 1, 1);

// SECTION 6: SAVE SYSTEM
// ============================================================
function loadSave() {
    try {
        const data = JSON.parse(localStorage.getItem(SAVE_KEY));
        return data || defaultSave();
    } catch(e) { return defaultSave(); }
}

function saveSave(data) {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function defaultSave() {
    return {
        unlockedLevels: { mango: ['1-1'], violet: ['1-1'], mochi: ['1-1'] },
        completed: { mango: [], violet: [], mochi: [] },
        goldenTreats: [],
        squeakyToys: [],
        totalTreats: 0,
        lives: MAX_LIVES,
        stars: {},
        hardcore: false
    };
}

        this.add.text(cx + 130, 330, 'Mochi', { fontSize: '13px', fontFamily: 'monospace', color: '#F0A050', stroke: '#3A1808', strokeThickness: 3 }).setOrigin(0.5);
        const updateModeText = () => {
            const s = loadSave();
            if (s.hardcore) {
                modeText.setText('[H] HARDCORE — game over = start over');
                modeText.setColor('#E06060');
            } else {
                modeText.setText('[H] Normal — progress saved');
                modeText.setColor('#80C080');
            }
        };
        updateModeText();
        this.input.keyboard.on('keydown-H', () => {
            const s = loadSave();
            s.hardcore = !s.hardcore;
            saveSave(s);
            sfx.play('select');
            updateModeText();
        });

        // === DOGCATCHER (sneaking in background) ===
        const catcher = this.add.image(-40, 300, 'boss').setScale(0.8).setAlpha(0.4).setDepth(-1);
        this.tweens.add({ targets: catcher, x: GAME_WIDTH + 40, duration: 15000, repeat: -1, delay: 3000 });

        // Start game
        // Version number
        this.add.text(GAME_WIDTH - 8, GAME_HEIGHT - 8, 'v' + VERSION, {
            fontSize: '8px', fontFamily: 'monospace', color: '#C0C0C0'
        }).setOrigin(1, 1);

        const startGame = () => {
            sfx.resume(); sfx.play('select');
            const s = loadSave();
            if (s.hardcore) {
                const fresh = defaultSave();
                fresh.hardcore = true;
                saveSave(fresh);
            }
            this.cameras.main.fadeOut(300, 0, 0, 0);
            this.cameras.main.once('camerafadeoutcomplete', () => {
                this.scene.start('CharacterSelect');
            });
        };
        this.input.keyboard.on('keydown-SPACE', startGame);
        this.input.keyboard.on('keydown-ENTER', startGame);
        this.input.on('pointerdown', startGame);
    }
}

// --- CHARACTER SELECT ---
class CharacterSelectScene extends Phaser.Scene {
    constructor() { super('CharacterSelect'); }
    create() {
        sfx.stopMusic();
        showGameTouchControls(false);
        this.cameras.main.setBackgroundColor('#1A1A2E');
        const cx = GAME_WIDTH / 2;
        this.selected = 0;
        const dogs = ['mango', 'violet', 'mochi'];

            'Tiny & Fast\nAbility: Bark\nHP: 2',
            'Tall & Agile\nDouble Jump!\nHP: 2',
            'Big & Tough\nAbility: Slam\nHP: 4'
        ];

        this.nameTexts = [];

            this.borders.push(border);
            this.dogImages.push(this.add.image(x, 130, dog).setScale(4));

            }).setOrigin(0.5));
            this.descTexts.push(this.add.text(x, 265, descs[i], {
                fontSize: '10px', fontFamily: 'monospace', color: '#C0C0C0', align: 'center'
            }).setOrigin(0.5));
        });

        this.add.text(cx, 360, 'A/D to choose  |  ENTER to confirm', {
            fontSize: '12px', fontFamily: 'monospace', color: '#808080'
        }).setOrigin(0.5);

        this.add.text(cx, 390, 'ESC to go back', {
            fontSize: '10px', fontFamily: 'monospace', color: '#606060'
        }).setOrigin(0.5);

        this.updateSelection();

        this.input.keyboard.on('keydown-LEFT', () => { this.selected = (this.selected + 2) % 3; sfx.play('select'); this.updateSelection(); });
        this.input.keyboard.on('keydown-RIGHT', () => { this.selected = (this.selected + 1) % 3; sfx.play('select'); this.updateSelection(); });
        this.input.keyboard.on('keydown-A', () => { this.selected = (this.selected + 2) % 3; sfx.play('select'); this.updateSelection(); });
        this.input.keyboard.on('keydown-D', () => { this.selected = (this.selected + 1) % 3; sfx.play('select'); this.updateSelection(); });
        this.input.keyboard.on('keydown-ENTER', () => {
            sfx.play('select');
            this.scene.start('WorldMap', { dog: dogs[this.selected] });
        });
        this.input.keyboard.on('keydown-SPACE', () => {
            sfx.play('select');
            this.scene.start('WorldMap', { dog: dogs[this.selected] });
        });
        this.input.keyboard.on('keydown-ESC', () => this.scene.start('Title'));
        // Touch: tap on dog panels to select/confirm
        this.borders.forEach((border, i) => {
            border.setInteractive();
            border.on('pointerdown', () => {
                sfx.play('select');
                if (this.selected === i) {
                    this.scene.start('WorldMap', { dog: dogs[this.selected] });
                } else {
                    this.selected = i;
                    this.updateSelection();
                }
            });
        });
    }

    updateSelection() {
        this.borders.forEach((b, i) => {
            b.setStrokeStyle(i === this.selected ? 3 : 2, i === this.selected ? 0xFFD700 : 0x808090);
            b.setFillStyle(i === this.selected ? 0x505080 : 0x404060);
        });
        this.dogImages.forEach((img, i) => img.setScale(i === this.selected ? 5 : 4));
    }
}

// --- WORLD MAP ---
class WorldMapScene extends Phaser.Scene {
    constructor() { super('WorldMap'); }
    create(data) {
        sfx.stopMusic();
        showGameTouchControls(false);
        this.dog = data.dog || 'mango';
        this.cameras.main.setBackgroundColor('#2A2A4E');
        const cx = GAME_WIDTH / 2;
        const save = loadSave();
        const unlocked = save.unlockedLevels[this.dog] || ['1-1'];
        const completed = save.completed[this.dog] || [];

        this.add.text(cx, 20, `World Map — ${this.dog.charAt(0).toUpperCase() + this.dog.slice(1)}`, {
            fontSize: '20px', fontFamily: 'monospace', color: '#FFD700'
        }).setOrigin(0.5);

        const worlds = [
            { name: 'The Neighborhood', levels: ['1-1', '1-2', '1-3', '1-4'] },
            { name: 'Downtown', levels: ['2-1', '2-2', '2-3', '2-4'] },
            { name: 'The Great Outdoors', levels: ['3-1', '3-2', '3-3', '3-4'] },
            { name: 'Home', levels: ['final'] }
        ];

        this.levelButtons = [];
        this.selectedLevel = 0;
        this.levelKeys = [];

        worlds.forEach((world, wi) => {
            const wy = 60 + wi * 85;
            this.add.text(25, wy, world.name, {
                fontSize: '14px', fontFamily: 'monospace', color: '#C0C0D0'
            });

            world.levels.forEach((lv, li) => {
                const lx = 35 + li * 145;
                const ly = wy + 24;
                const isUnlocked = unlocked.includes(lv);
                const isCompleted = completed.includes(lv);
                const color = isCompleted ? 0x40A040 : isUnlocked ? 0x4060A0 : 0x404040;
                const lvNames = {
                    '1-1':'Front Yard','1-2':'Sidewalk','1-3':'Dog Park','1-4':'Chase!',
                    '2-1':'Alley Cats','2-2':'Rooftops','2-3':'Construction','2-4':'Boss!',
                    '3-1':'River Trail','3-2':'Ice Pond','3-3':'Deep Cave','3-4':'Final Boss!',
                    'final':'Home'
                };
                const displayName = isUnlocked ? (lvNames[lv] || lv) : '???';
                const rect = this.add.rectangle(lx + 45, ly + 12, 120, 30, color).setStrokeStyle(1, 0x808090);
                this.add.text(lx + 45, ly + 12, displayName, {
                    fontSize: '11px', fontFamily: 'monospace', color: isUnlocked ? '#FFFFFF' : '#606060'
                }).setOrigin(0.5);

                // Collectible icons inside the button (right side)
                const rcx = lx + 45;
                const rcy = ly + 12;
                const hasSqueaky = save.squeakyToys.some(s => s.startsWith(lv + '-'));
                const hasGolden = save.goldenTreats.includes(lv);
                // Use actual sprites scaled down
                let iconX = rcx + 50;
                if (hasGolden) {
                    this.add.image(iconX, rcy, 'golden').setScale(0.8);
                    iconX -= 18;
                }
                if (hasSqueaky) {
                    this.add.image(iconX, rcy, 'squeaky').setScale(0.7);
                }

                // Star rating
                const starKey = this.dog + '-' + lv;
                const starCount = save.stars && save.stars[starKey] ? save.stars[starKey] : 0;
                if (starCount > 0) {
                    this.add.text(rcx, rcy + 22, '\u2605'.repeat(starCount) + '\u2606'.repeat(3 - starCount), {
                        fontSize: '8px', fontFamily: 'monospace', color: '#FFD700'
                    }).setOrigin(0.5);
                }

                this.levelButtons.push({ rect, key: lv, unlocked: isUnlocked });
                // Touch: tap to select and launch level
                const btnIdx = this.levelButtons.length - 1;
                rect.setInteractive();
                rect.on('pointerdown', () => {
                    this.selectedLevel = btnIdx;
                    this.updateMapSelection();
                    this.launchLevel();
                });
                this.levelKeys.push(lv);
            });
        });

        // Default to the highest unlocked level that hasn't been beaten yet,
        // or the last unlocked level if all are beaten
        this.selectedLevel = 0;
        let lastUnlocked = 0;
        let firstUnbeaten = -1;
        for (let i = 0; i < this.levelButtons.length; i++) {
            if (this.levelButtons[i].unlocked) {
                lastUnlocked = i;
                if (firstUnbeaten === -1 && !completed.includes(this.levelButtons[i].key)) {
                    firstUnbeaten = i;
                }
            }
        }
        this.selectedLevel = firstUnbeaten >= 0 ? firstUnbeaten : lastUnlocked;
        this.updateMapSelection();

        this.add.text(cx, 405, 'WASD: navigate  |  ENTER: play  |  ESC: back', {
            fontSize: '10px', fontFamily: 'monospace', color: '#808080'
        }).setOrigin(0.5);

        // Stats
        this.add.text(15, 410, `Treats: ${save.totalTreats}  Lives: ${save.lives}`, {
            fontSize: '10px', fontFamily: 'monospace', color: '#C0C0C0'
        });

        this.input.keyboard.on('keydown-LEFT', () => { this.selectedLevel = Math.max(0, this.selectedLevel - 1); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-RIGHT', () => { this.selectedLevel = Math.min(this.levelButtons.length - 1, this.selectedLevel + 1); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-UP', () => { this.selectedLevel = Math.max(0, this.selectedLevel - 4); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-DOWN', () => { this.selectedLevel = Math.min(this.levelButtons.length - 1, this.selectedLevel + 4); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-A', () => { this.selectedLevel = Math.max(0, this.selectedLevel - 1); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-D', () => { this.selectedLevel = Math.min(this.levelButtons.length - 1, this.selectedLevel + 1); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-W', () => { this.selectedLevel = Math.max(0, this.selectedLevel - 4); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-S', () => { this.selectedLevel = Math.min(this.levelButtons.length - 1, this.selectedLevel + 4); sfx.play('select'); this.updateMapSelection(); });
        this.input.keyboard.on('keydown-ENTER', () => this.launchLevel());
        this.input.keyboard.on('keydown-SPACE', () => this.launchLevel());
        this.input.keyboard.on('keydown-ESC', () => this.scene.start('CharacterSelect'));
    }

    updateMapSelection() {
        this.levelButtons.forEach((btn, i) => {
            btn.rect.setStrokeStyle(i === this.selectedLevel ? 2 : 1, i === this.selectedLevel ? 0xFFD700 : 0x808090);
        });
    }

    launchLevel() {
        const btn = this.levelButtons[this.selectedLevel];
        if (!btn.unlocked) { sfx.play('hurt'); return; }
        const key = btn.key;
        let world = 1, level = 1;
        if (key === 'final') { world = 4; level = 1; }
        else { const parts = key.split('-'); world = parseInt(parts[0]); level = parseInt(parts[1]); }
        sfx.play('select');
        this.scene.start('Game', { dog: this.dog, world, level, levelKey: key });
    }
}

// --- GAME SCENE ---
class GameScene extends Phaser.Scene {
    constructor() { super('Game'); }

    create(data) {
        showGameTouchControls(true);
        this.dogType = data.dog || 'mango';
        this.worldNum = data.world || 1;
        this.levelNum = data.level || 1;
        this.levelKey = data.levelKey || '1-1';
        this.stats = DOG_STATS[this.dogType];
        this.save = loadSave();

        this.hp = this.stats.health;
        this.maxHp = this.stats.health;
        this.treats = 0;
        this.invincible = false;
        this.abilityCooldown = 0;
        this.isDashing = false;
        this.isDigging = false;
        this.isSlamming = false;
        this.hasDoubleJumped = false;
        this.facingRight = true;
        this.dead = false;
        this.won = false;
        this.barkCooldown = 0;
        this.drowning = false;
        this.levelTime = 0;

        // Build level
        const levelData = createLevel(this.worldNum, this.levelNum);
        this.levelData = levelData;

        // Set world size
        const worldW = levelData.width * TILE_SIZE;
        const worldH = levelData.height * TILE_SIZE;
        this.physics.world.setBounds(0, 0, worldW, worldH);
        this.cameras.main.setBounds(0, 0, worldW, worldH);

        // Background
        this.cameras.main.setBackgroundColor(
            this.worldNum === 4 ? '#F0E8D8' : this.worldNum === 3 ? '#2A3A4A' : this.worldNum === 2 ? '#6080A0' : PAL.SKY
        );

        // === Parallax backgrounds — two layers for depth ===
        const bgFar = this.add.graphics();
        const bgNear = this.add.graphics();

        if (this.worldNum === 1) {
            // WORLD 1: Neighborhood — blue sky, fluffy clouds, distant hills, houses
            // Far layer: hills and sun
            bgFar.fillStyle(0x6AB848, 0.3);
            // Rolling hills
            for (let i = 0; i < 20; i++) {
                const hx = i * 80;
                const hy = worldH - 140 - Math.sin(i * 0.7) * 20;
                bgFar.fillRect(hx, hy, 80, worldH - hy);
            }
            // Sun
            bgFar.fillStyle(0xFFE060, 0.4);
            bgFar.fillCircle(worldW - 100, 50, 30);
            bgFar.fillStyle(0xFFF0A0, 0.3);
            bgFar.fillCircle(worldW - 100, 50, 40);
            // Clouds (fluffy, multi-layer)
            for (let i = 0; i < 12; i++) {
                const cx = i * 90 + (i % 3) * 20;
                const cy = 25 + (i % 4) * 20;
                const cw = 30 + (i % 3) * 20;
                bgFar.fillStyle(0xFFFFFF, 0.6);
                bgFar.fillRect(cx, cy, cw, 14);
                bgFar.fillRect(cx + 5, cy - 6, cw - 10, 10);
                bgFar.fillRect(cx + cw * 0.3, cy - 10, cw * 0.4, 8);
                bgFar.fillStyle(0xFFFFFF, 0.3);
                bgFar.fillRect(cx - 4, cy + 4, cw + 8, 8);
            }
            // Near layer: houses and trees
            for (let i = 0; i < 15; i++) {
                const hx = i * 90 + 10;
                const hy = worldH - 110;
                if (i % 3 === 0) {
                    // House
                    bgNear.fillStyle(0xC0A080, 0.35);
                    bgNear.fillRect(hx, hy, 35, 30);
                    // Roof
                    bgNear.fillStyle(0xA04030, 0.35);
                    bgNear.fillTriangle(hx - 4, hy, hx + 39, hy, hx + 17, hy - 18);
                    // Window
                    bgNear.fillStyle(0x80C0E0, 0.3);
                    bgNear.fillRect(hx + 8, hy + 8, 8, 8);
                    bgNear.fillRect(hx + 20, hy + 8, 8, 8);
                    // Door
                    bgNear.fillStyle(0x604020, 0.3);
                    bgNear.fillRect(hx + 13, hy + 14, 10, 16);
                } else {
                    // Tree
                    bgNear.fillStyle(0x5A3A20, 0.3);
                    bgNear.fillRect(hx + 8, hy, 6, 30);
                    bgNear.fillStyle(0x2A7A2A, 0.35);
                    bgNear.fillCircle(hx + 11, hy - 5, 14);
                    bgNear.fillStyle(0x3A8A3A, 0.25);
                    bgNear.fillCircle(hx + 6, hy, 10);
                    bgNear.fillCircle(hx + 16, hy, 10);
                }
            }

        } else if (this.worldNum === 2) {
            // WORLD 2: Downtown — city skyline with lit windows, cranes
            // Far layer: distant skyscrapers
            for (let i = 0; i < 15; i++) {
                const bx = i * 70;
                const bh = 80 + (i * 47 % 80);
                const by = worldH - bh - TILE_SIZE * 3;
                // Building body
                bgFar.fillStyle(0x3A4A5A, 0.4);
                bgFar.fillRect(bx, by, 30, bh);
                // Windows (grid of lit yellow dots)
                bgFar.fillStyle(0xE0D060, 0.3);
                for (let wy = by + 6; wy < by + bh - 8; wy += 10) {
                    for (let wx = bx + 4; wx < bx + 26; wx += 8) {
                        if (Math.random() > 0.3) {
                            bgFar.fillRect(wx, wy, 4, 4);
                        }
                    }
                }
                // Roof antenna/detail
                bgFar.fillStyle(0x505A68, 0.4);
                bgFar.fillRect(bx + 12, by - 8, 3, 8);
            }
            // Near layer: closer buildings with more detail
            for (let i = 0; i < 10; i++) {
                const bx = i * 100 + 20;
                const bh = 60 + (i * 31 % 60);
                const by = worldH - bh - TILE_SIZE * 2;
                bgNear.fillStyle(0x4A5A6A, 0.5);
                bgNear.fillRect(bx, by, 50, bh);
                // Windows
                bgNear.fillStyle(0xE0D878, 0.35);
                for (let wy = by + 8; wy < by + bh - 8; wy += 12) {
                    for (let wx = bx + 6; wx < bx + 44; wx += 10) {
                        if (Math.random() > 0.25) {
                            bgNear.fillRect(wx, wy, 6, 6);
                        }
                    }
                }
                // Rooftop
                bgNear.fillStyle(0x5A6A7A, 0.4);
                bgNear.fillRect(bx - 2, by, 54, 4);
                // Water tower on some buildings
                if (i % 3 === 0) {
                    bgNear.fillStyle(0x6A5A4A, 0.35);
                    bgNear.fillRect(bx + 18, by - 16, 14, 12);
                    bgNear.fillRect(bx + 20, by - 20, 10, 5);
                    // Legs
                    bgNear.fillRect(bx + 19, by - 5, 2, 5);
                    bgNear.fillRect(bx + 29, by - 5, 2, 5);
                }
            }

        } else if (this.worldNum === 3) {
            // WORLD 3: Outdoors — layered forest, mountains, cave atmosphere
            const isCave = this.levelNum === 3;

            if (isCave) {
                // Cave: deep underground atmosphere with rocky walls, crystals, lava glow
                // Dark rock background fill
                bgFar.fillStyle(0x1A1A28, 0.7);
                bgFar.fillRect(0, 0, worldW, worldH);

                // Layered rock texture on walls (far)
                for (let i = 0; i < 25; i++) {
                    const rx = i * 50 + (i * 13 % 20);
                    bgFar.fillStyle(0x2A2A38, 0.5);
                    bgFar.fillRect(rx, 0, 30 + (i % 3) * 10, 20 + (i * 7 % 15));
                    bgFar.fillStyle(0x22222E, 0.4);
                    bgFar.fillRect(rx + 5, worldH - 40 - (i * 11 % 30), 20 + (i % 4) * 8, 40 + (i * 11 % 30));
                }

                // Stalactites (varied sizes, jagged)
                for (let i = 0; i < 25; i++) {
                    const sx = i * 48 + (i * 17 % 25);
                    const sh = 25 + (i * 19 % 55);
                    const sw = 8 + (i * 7 % 12);
                    bgFar.fillStyle(i % 3 === 0 ? 0x3A3A4E : 0x2E2E40, 0.7);
                    bgFar.fillTriangle(sx, 0, sx + sw, 0, sx + sw / 2, sh);
                    // Drip highlight
                    bgFar.fillStyle(0x4A4A5E, 0.3);
                    bgFar.fillTriangle(sx + 2, 0, sx + sw / 2, 0, sx + sw / 2 - 1, sh * 0.6);
                }

                // Stalagmites (growing up from floor)
                const floorY = worldH - TILE_SIZE * 3;
                for (let i = 0; i < 18; i++) {
                    const sx = i * 65 + 20 + (i * 23 % 30);
                    const sh = 20 + (i * 17 % 40);
                    const sw = 10 + (i * 11 % 10);
                    bgFar.fillStyle(0x3A3A4A, 0.5);
                    bgFar.fillTriangle(sx, floorY, sx + sw, floorY, sx + sw / 2, floorY - sh);
                }

                // Glowing crystal clusters (near layer, varied colors)
                const crystalColors = [0x40A0FF, 0x8060E0, 0x40E0A0, 0xE060A0, 0x60C0FF];
                for (let i = 0; i < 12; i++) {
                    const cx = i * 95 + 30 + (i * 37 % 40);
                    const onCeiling = i % 3 === 0;
                    const cy = onCeiling ? 15 + (i * 13 % 30) : floorY - 10 - (i * 11 % 30);
                    const cc = crystalColors[i % crystalColors.length];
                    const cs = 4 + (i % 3) * 2;

                    // Crystal shard (main)
                    bgNear.fillStyle(cc, 0.5);
                    if (onCeiling) {
                        bgNear.fillTriangle(cx, cy, cx + cs, cy, cx + cs / 2, cy + cs * 2.5);
                        bgNear.fillTriangle(cx - 3, cy, cx + cs / 2 - 1, cy, cx + cs / 2 - 3, cy + cs * 1.5);
                    } else {
                        bgNear.fillTriangle(cx, cy, cx + cs, cy, cx + cs / 2, cy - cs * 2.5);
                        bgNear.fillTriangle(cx + cs, cy, cx + cs + 4, cy, cx + cs + 1, cy - cs * 1.8);
                    }

                    // Glow aura
                    bgNear.fillStyle(cc, 0.08);
                    bgNear.fillCircle(cx + cs / 2, onCeiling ? cy + cs : cy - cs, cs * 3);
                    bgNear.fillStyle(cc, 0.05);
                    bgNear.fillCircle(cx + cs / 2, onCeiling ? cy + cs : cy - cs, cs * 5);
                }

                // Ambient particles (small floating dots)
                for (let i = 0; i < 20; i++) {
                    const px = (i * 59 + 17) % worldW;
                    const py = 40 + (i * 43 % (worldH - 120));
                    bgNear.fillStyle(0xFFFFFF, 0.06 + (i % 3) * 0.03);
                    bgNear.fillCircle(px, py, 1 + i % 2);
                }

                // Subtle lava/warm glow at the very bottom
                bgFar.fillStyle(0xE04020, 0.06);
                bgFar.fillRect(0, floorY - 10, worldW, 20);
                bgFar.fillStyle(0xFF6030, 0.04);
                bgFar.fillRect(0, floorY - 5, worldW, 15);
            } else {
                // Forest: mountains, layered trees
                // Far layer: mountains
                bgFar.fillStyle(0x5A7A9A, 0.3);
                bgFar.fillTriangle(0, worldH - 100, 150, worldH - 100, 75, worldH - 200);
                bgFar.fillTriangle(120, worldH - 100, 320, worldH - 100, 220, worldH - 230);
                bgFar.fillTriangle(280, worldH - 100, 450, worldH - 100, 365, worldH - 190);
                bgFar.fillTriangle(400, worldH - 100, 600, worldH - 100, 500, worldH - 220);
                bgFar.fillTriangle(550, worldH - 100, 750, worldH - 100, 650, worldH - 180);
                // Snow caps
                bgFar.fillStyle(0xE0E8F0, 0.25);
                bgFar.fillTriangle(55, worldH - 185, 95, worldH - 185, 75, worldH - 200);
                bgFar.fillTriangle(200, worldH - 215, 240, worldH - 215, 220, worldH - 230);
                bgFar.fillTriangle(480, worldH - 205, 520, worldH - 205, 500, worldH - 220);

                // Near layer: trees
                for (let i = 0; i < 18; i++) {
                    const tx = i * 65 + (i % 3) * 10;
                    const ty = worldH - 90 - (i % 2) * 10;
                    // Trunk
                    bgNear.fillStyle(0x4A3018, 0.35);
                    bgNear.fillRect(tx + 8, ty, 8, 50);
                    // Foliage layers (triangles for pine trees)
                    bgNear.fillStyle(0x1A5A1A, 0.4);
                    bgNear.fillTriangle(tx - 2, ty + 10, tx + 26, ty + 10, tx + 12, ty - 20);
                    bgNear.fillStyle(0x2A6A2A, 0.35);
                    bgNear.fillTriangle(tx, ty + 2, tx + 24, ty + 2, tx + 12, ty - 14);
                    bgNear.fillStyle(0x3A7A3A, 0.3);
                    bgNear.fillTriangle(tx + 2, ty - 4, tx + 22, ty - 4, tx + 12, ty - 25);
                }
            }
        } else if (this.worldNum === 4) {
            // HOME: Inside the house — warm walls, windows, pictures, carpet
            // Wall color (warm beige)
            bgFar.fillStyle(0xE8D8C0, 0.3);
            bgFar.fillRect(0, 0, worldW, worldH);
            // Baseboard
            bgFar.fillStyle(0xC0A878, 0.4);
            bgFar.fillRect(0, worldH - TILE_SIZE * 4, worldW, 8);
            // Wainscoting (lower wall darker)
            bgFar.fillStyle(0xD8C8A8, 0.25);
            bgFar.fillRect(0, worldH - TILE_SIZE * 6, worldW, TILE_SIZE * 3);
            // Windows with light
            for (let i = 0; i < 4; i++) {
                const wx = 80 + i * 280;
                const wy = 40;
                // Window frame
                bgFar.fillStyle(0xC0B090, 0.4);
                bgFar.fillRect(wx - 4, wy - 4, 88, 108);
                // Window glass (sky blue)
                bgFar.fillStyle(0xA0D0F0, 0.4);
                bgFar.fillRect(wx, wy, 80, 100);
                // Window panes
                bgFar.fillStyle(0xC0B090, 0.3);
                bgFar.fillRect(wx + 38, wy, 4, 100);
                bgFar.fillRect(wx, wy + 48, 80, 4);
                // Curtains
                bgFar.fillStyle(0xC06040, 0.2);
                bgFar.fillRect(wx - 8, wy - 8, 16, 116);
                bgFar.fillRect(wx + 72, wy - 8, 16, 116);
            }
            // Picture frames on wall
            for (let i = 0; i < 6; i++) {
                const px = 40 + i * 200;
                const py = 80 + (i % 2) * 30;
                bgNear.fillStyle(0x806040, 0.3);
                bgNear.fillRect(px, py, 44, 34);
                bgNear.fillStyle(0xD0C0A0, 0.25);
                bgNear.fillRect(px + 4, py + 4, 36, 26);
                // Little picture inside (colored rectangle)
                const colors = [0x80C0E0, 0xE0C080, 0x80E080, 0xE08080, 0xC080E0, 0xE0B060];
                bgNear.fillStyle(colors[i], 0.2);
                bgNear.fillRect(px + 6, py + 6, 32, 22);
            }
            // Carpet/rug pattern on floor
            bgNear.fillStyle(0xC04030, 0.15);
            bgNear.fillRect(100, worldH - TILE_SIZE * 3 - 4, 300, TILE_SIZE * 3);
            bgNear.fillStyle(0xD06050, 0.1);
            bgNear.fillRect(110, worldH - TILE_SIZE * 3 + 4, 280, TILE_SIZE * 3 - 16);
            bgNear.fillRect(600, worldH - TILE_SIZE * 3 - 4, 250, TILE_SIZE * 3);
        }

        bgFar.setScrollFactor(0.15);
        bgNear.setScrollFactor(0.35);

        // Create tilemap layer using static tiles
        this.groundGroup = this.physics.add.staticGroup();
        this.waterGroup = this.physics.add.staticGroup();
        this.spikeGroup = this.physics.add.staticGroup();
        this.softDirtGroup = this.physics.add.staticGroup();
        this.crackedGroup = this.physics.add.staticGroup();
        this.barrierGroup = this.physics.add.staticGroup();
        this.doorGroup = this.physics.add.staticGroup();
        this.icePositions = [];

        for (let y = 0; y < levelData.height; y++) {
            for (let x = 0; x < levelData.width; x++) {
                const tile = levelData.tiles[y][x];
                if (tile === T.EMPTY || tile === T.CAVE_BG) continue;

                const px = x * TILE_SIZE + TILE_SIZE / 2;
                const py = y * TILE_SIZE + TILE_SIZE / 2;

                // Handle door tiles specially — render as a single image
                if (tile === T.DOOR) {
                    const aboveIsDoor = y > 0 && levelData.tiles[y - 1][x] === T.DOOR;
                    if (!aboveIsDoor) {
                        const isHome = this.worldNum === 4;
                        const doorImg = this.add.image(px, isHome ? py + TILE_SIZE - 4 : py + TILE_SIZE / 2, isHome ? 'dogbed' : 'door');
                        this.physics.add.existing(doorImg, true);
                        doorImg.body.setSize(32, TILE_SIZE * 2);
                        this.doorGroup.add(doorImg);
                        // Boss levels: show sign instead, reveal doghouse when boss dies
                        const isBossLevel = (this.worldNum === 2 && this.levelNum === 4) ||
                                            (this.worldNum === 3 && this.levelNum === 4);
                        if (isBossLevel) {
                            doorImg.setVisible(false);
                            doorImg.body.enable = false;
                            // Place a "defeat boss" sign where the doghouse will appear
                            this.bossSign = this.add.image(px, py + TILE_SIZE / 2, 'boss_sign');
                            this.tweens.add({
                                targets: this.bossSign, y: py + TILE_SIZE / 2 - 3,
                                duration: 1000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
                            });
                        } else {
                            this.tweens.add({
                                targets: doorImg, alpha: 0.65, duration: 800,
                                yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
                            });
                        }
                    }
                    continue;
                }

                // Create a colored rectangle for each tile
                const rect = this.add.rectangle(px, py, TILE_SIZE, TILE_SIZE, this.getTileHexColor(tile));

                if (tile === T.WATER) {
                    rect.setFillStyle(0x4080D0, 0.7);
                    this.physics.add.existing(rect, true);
                    this.waterGroup.add(rect);
                } else if (tile === T.SPIKE) {
                    rect.destroy();
                    const spike = this.add.image(px, py, 'spike_sprite');
                    this.physics.add.existing(spike, true);
                    this.spikeGroup.add(spike);
                } else if (tile === T.DIRT_SOFT) {
                    rect.destroy();
                    const sd = this.add.image(px, py, 'softdirt_sprite');
                    this.physics.add.existing(sd, true);
                    this.softDirtGroup.add(sd);
                } else if (tile === T.CRACKED) {
                    rect.destroy();
                    const cr = this.add.image(px, py, 'cracked_sprite');
                    this.physics.add.existing(cr, true);
                    this.crackedGroup.add(cr);
                } else if (tile === T.BARRIER) {
                    rect.destroy();
                    const bar = this.add.image(px, py, 'barrier_sprite');
                    this.physics.add.existing(bar, true);
                    this.barrierGroup.add(bar);
                } else if (tile === T.ICE) {
                    rect.destroy();
                    const ice = this.add.image(px, py, 'ice_sprite');
                    this.physics.add.existing(ice, true);
                    this.groundGroup.add(ice);
                    this.icePositions.push({ x: px, y: py });
                } else if (tile === T.FENCE) {
                    rect.destroy();
                    this.add.image(px, py, 'fence_sprite');
                } else if (tile === T.HYDRANT) {
                    rect.destroy();
                    const hyd = this.add.image(px, py, 'hydrant_sprite');
                    this.physics.add.existing(hyd, true);
                    this.groundGroup.add(hyd);
                } else {
                    this.physics.add.existing(rect, true);
                    this.groundGroup.add(rect);
                }
            }
        }

        // Player
        const sp = levelData.spawns.player;
        this.player = this.add.image(
            sp.x * TILE_SIZE + TILE_SIZE / 2,
            sp.y * TILE_SIZE + TILE_SIZE / 2,
            this.dogType
        );
        // Respawn at checkpoint if available
        if (data.checkpoint) {
            this.player.x = data.checkpoint.x * TILE_SIZE + TILE_SIZE / 2;
            this.player.y = data.checkpoint.y * TILE_SIZE + TILE_SIZE / 2;
        }
        this.physics.add.existing(this.player);
        // Spawn-in animation: brief invincibility + flash
        if (data.checkpoint) {
            this.invincible = true;
            this.player.setAlpha(0);
            this.tweens.add({
                targets: this.player, alpha: 1, duration: 200,
                onComplete: () => {
                    this.tweens.add({
                        targets: this.player, alpha: 0.3, duration: 80,
                        yoyo: true, repeat: 6,
                        onComplete: () => { this.invincible = false; this.player.setAlpha(1); }
                    });
                }
            });
        }
        this.player.body.setSize(this.stats.width, this.stats.height);
        // Collide with left/right/top world bounds but NOT bottom (pits kill you)
        this.player.body.setCollideWorldBounds(true);
        this.player.body.onWorldBounds = true;
        this.physics.world.setBoundsCollision(true, true, true, false);
        this.player.body.setGravityY(GRAVITY);
        this.player.body.setMaxVelocity(this.stats.speed, 600);

        // Camera follow
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

        // Collisions — player collides with all solid tile groups
        this.physics.add.collider(this.player, this.groundGroup);
        this.physics.add.collider(this.player, this.softDirtGroup);
        this.physics.add.collider(this.player, this.crackedGroup);
        this.physics.add.collider(this.player, this.barrierGroup);
        this.physics.add.overlap(this.player, this.waterGroup, () => {
            if (this.dead || this.won || this.drowning) return;
            this.drowning = true;
            // Splash particles
            for (let i = 0; i < 8; i++) {
                const sp = this.add.rectangle(
                    this.player.x + Phaser.Math.Between(-12, 12),
                    this.player.y,
                    Phaser.Math.Between(3, 6), Phaser.Math.Between(3, 6),
                    0x60C0FF, 0.7
                );
                this.tweens.add({
                    targets: sp,
                    x: sp.x + Phaser.Math.Between(-20, 20),
                    y: sp.y - Phaser.Math.Between(10, 30),
                    alpha: 0, duration: 500,
                    onComplete: () => sp.destroy()
                });
            }
            sfx.play('hurt');
            // Dog sinks and flails
            this.player.body.setVelocity(0, 0);
            this.player.body.setAllowGravity(false);
            this.tweens.add({
                targets: this.player,
                y: this.player.y + 20,
                alpha: 0,
                angle: Phaser.Math.Between(-30, 30),
                duration: 800,
                ease: 'Sine.easeIn',
                onComplete: () => {
                    this.drowning = false;
                    this.hurtPlayer(true);
                }
            });
        });
        this.physics.add.overlap(this.player, this.spikeGroup, () => this.hurtPlayer(true));
        this.physics.add.overlap(this.player, this.doorGroup, () => this.winLevel());

        // Enemies
        this.enemies = this.physics.add.group({ allowGravity: true });
        this.projectiles = this.physics.add.group({ allowGravity: false });
        levelData.spawns.enemies.forEach(e => this.spawnEnemy(e));

        this.physics.add.collider(this.enemies, this.groundGroup);
        this.physics.add.collider(this.enemies, this.softDirtGroup);
        this.physics.add.collider(this.enemies, this.crackedGroup);
        this.physics.add.collider(this.enemies, this.barrierGroup);

        // Enemy overlap with player
        this.physics.add.overlap(this.player, this.enemies, (player, enemy) => {
            if (this.dead || this.won || enemy.dying || enemy.calmed) return;
            // Check if stomping
            // Porcupines and sprinklers can't be stomped — always hurt
            if (enemy.enemyType === 'porcupine' || enemy.enemyType === 'sprinkler') {
                if (!this.invincible && !this.isDashing) this.hurtPlayer();
            } else if (player.body.velocity.y > 0 && player.body.bottom < enemy.body.top + 12) {
                this.stompEnemy(enemy);
            } else if (!this.invincible && !this.isDashing) {
                this.hurtPlayer();
            }
        });

        this.physics.add.overlap(this.player, this.projectiles, (player, proj) => {
            if (!this.invincible && !this.isDashing) this.hurtPlayer();
            proj.destroy();
        });

        // Collectibles
        this.collectibleGroup = this.physics.add.staticGroup();
        levelData.spawns.collectibles.forEach(c => {
            const cx = c.x * TILE_SIZE + TILE_SIZE / 2;
            const cy = c.y * TILE_SIZE + TILE_SIZE / 2;
            const texMap = { treat: 'treat', squeaky: 'squeaky', golden: 'golden', water: 'water_bowl' };
            const item = this.collectibleGroup.create(cx, cy, texMap[c.type] || 'treat');
            item.collectType = c.type;

            // Bob animation for special items
            if (c.type !== 'treat') {
                this.tweens.add({ targets: item, y: cy - 4, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            }
        });

        this.physics.add.overlap(this.player, this.collectibleGroup, (player, item) => {
            this.collectItem(item);
        });

        // Auto-scroll level: add visible dogcatcher chasing from behind
        this.chaserDogcatcher = null;
        this.chaseScrollX = 0;
        if (this.worldNum === 1 && this.levelNum === 4) {
            const groundY = 14 * TILE_SIZE;
            // Dogcatcher starts visible on the left side of screen
            this.chaserDogcatcher = this.add.image(20, groundY - 24, 'boss');
            this.chaserDogcatcher.setScale(1);
            // No tint — same sprite as boss fights
            this.chaserDogcatcher.setDepth(50);
            // Player starts further right so dogcatcher is visible (unless respawning at checkpoint)
            if (!data.checkpoint) {
                this.player.x = 8 * TILE_SIZE;
            }
            // Give player a moment before chase begins
            this.chaseDelay = data.checkpoint ? 500 : 1500;
            // Start chase boundary near checkpoint if respawning
            if (data.checkpoint) {
                this.chaseScrollX = data.checkpoint.x * TILE_SIZE - GAME_WIDTH / 2;
            }
        }

        // Moving platforms
        this.movingPlatforms = [];
        if (this.levelData.movingPlatforms) {
            this.levelData.movingPlatforms.forEach(mp => {
                const px = mp.x * TILE_SIZE + TILE_SIZE / 2;
                const py = mp.y * TILE_SIZE + TILE_SIZE / 2;
                const plat = this.add.rectangle(px, py, mp.width * TILE_SIZE, 6, 0x806040);
                this.physics.add.existing(plat, true);
                plat.mpData = mp;
                plat.startX = px;
                plat.startY = py;
                plat.mpTimer = 0;
                this.movingPlatforms.push(plat);
                this.physics.add.collider(this.player, plat);
                this.physics.add.collider(this.enemies, plat);
            });
        }

        // Checkpoints
        this.checkpointGroup = this.add.group();
        this.lastCheckpoint = null;
        if (this.levelData.checkpoints) {
            this.levelData.checkpoints.forEach(cp => {
                const cpx = cp.x * TILE_SIZE + TILE_SIZE / 2;
                const cpy = (cp.y + 1) * TILE_SIZE - 12; // sit on ground
                const flag = this.add.image(cpx, cpy, 'checkpoint');
                flag.cpData = { x: cp.x, y: cp.y };
                flag.activated = false;
                this.physics.add.existing(flag, true);
                this.checkpointGroup.add(flag);
            });
            this.physics.add.overlap(this.player, this.checkpointGroup, (player, flag) => {
                if (!flag.activated) {
                    flag.activated = true;
                    flag.setTexture('checkpoint_active');
                    this.lastCheckpoint = flag.cpData;
                    sfx.play('treat');
                    this.showFloatingText(flag.x, flag.y - 20, 'CHECKPOINT!', '#40FF40');
                }
            });
        }

        // HUD (fixed to camera)
        this.hudContainer = this.add.container(0, 0).setScrollFactor(0).setDepth(100);

        // Health hearts
        this.hearts = [];
        for (let i = 0; i < this.maxHp; i++) {
            const heart = this.add.image(20 + i * 20, 16, 'heart').setScrollFactor(0);
            this.hearts.push(heart);
            this.hudContainer.add(heart);
        }

        // Lives counter (left side, after hearts)
        const livesX = 20 + this.maxHp * 20 + 10;
        this.add.image(livesX, 14, this.dogType).setScale(0.5).setScrollFactor(0).setDepth(100);
        this.livesText = this.add.text(livesX + 14, 7, 'x' + this.save.lives, {
            fontSize: '14px', fontFamily: 'monospace', color: '#FFFFFF'
        }).setScrollFactor(0);
        this.hudContainer.add(this.livesText);

        // Timer
        this.timerText = this.add.text(GAME_WIDTH / 2, 24, '0:00', {
            fontSize: '10px', fontFamily: 'monospace', color: '#C0C0C0'
        }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(100);
        this.hudContainer.add(this.timerText);

        // Right side HUD: treat counter + collectible trackers with sprites
        // Treat counter with bone icon
        this.add.image(GAME_WIDTH - 140, 12, 'treat').setScale(1.2).setScrollFactor(0).setDepth(100);
        this.treatText = this.add.text(GAME_WIDTH - 128, 6, '0', {
            fontSize: '12px', fontFamily: 'monospace', color: '#FFD700'
        }).setScrollFactor(0);
        this.hudContainer.add(this.treatText);

        // Squeaky toy tracker with actual toy sprites
        this.squeakyFound = 0;
        this.squeakyTotal = levelData.spawns.collectibles.filter(c => c.type === 'squeaky').length;
        this.squeakyIcons = [];
        for (let i = 0; i < this.squeakyTotal; i++) {
            const icon = this.add.image(GAME_WIDTH - 140 + i * 16, 28, 'squeaky')
                .setScale(0.8).setScrollFactor(0).setDepth(100).setAlpha(0.3);
            this.squeakyIcons.push(icon);
            this.hudContainer.add(icon);
        }

        // Golden treat tracker with actual golden icon
        this.goldenTotal = levelData.spawns.collectibles.filter(c => c.type === 'golden').length;
        this.goldenFound = 0;
        this.goldenIcons = [];
        for (let i = 0; i < this.goldenTotal; i++) {
            const icon = this.add.image(GAME_WIDTH - 140 + (this.squeakyTotal) * 16 + 10 + i * 18, 28, 'golden')
                .setScale(0.7).setScrollFactor(0).setDepth(100).setAlpha(0.3);
            this.goldenIcons.push(icon);
            this.hudContainer.add(icon);
        }

        // Level name
        const levelName = this.getLevelName();
        this.add.text(GAME_WIDTH / 2, 8, levelName, {
            fontSize: '12px', fontFamily: 'monospace', color: '#FFFFFF'
        }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(100);

        // Ability cooldown indicator (not shown for Violet — her double jump is passive)
        if (this.dogType !== 'violet') {
            this.abilityText = this.add.text(14, 30, `[SHIFT] ${this.stats.ability}`, {
                fontSize: '10px', fontFamily: 'monospace', color: '#80FF80'
            }).setScrollFactor(0).setDepth(100);
        }

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = {
            w: this.input.keyboard.addKey('W'),
            a: this.input.keyboard.addKey('A'),
            s: this.input.keyboard.addKey('S'),
            d: this.input.keyboard.addKey('D')
        };
        this.keys = {
            shift: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT),
            m: this.input.keyboard.addKey('M'),
            esc: this.input.keyboard.addKey('ESC'),
            p: this.input.keyboard.addKey('P')
        };

        // Music — boss levels get boss theme, home level gets victory theme
        const isBoss = (this.levelNum === 4 && this.worldNum <= 3);
        const isHome = (this.worldNum === 4);
        sfx.startMusic(isHome ? 'home' : isBoss ? 'boss' : this.worldNum);

        // Mute toggle
        this.keys.m.on('down', () => sfx.toggle());
        this.keys.esc.on('down', () => this.pauseGame());
        this.keys.p.on('down', () => this.pauseGame());

        // Particles emitter (simple)
        this.dustParticles = [];
    }

    getTileHexColor(tile) {
        // Home level: wooden floors instead of grass/dirt
        if (this.worldNum === 4) {
            if (tile === T.GRASS) return 0xC0A070;   // hardwood floor
            if (tile === T.GROUND) return 0xA08858;   // darker floor
            if (tile === T.PLATFORM) return 0xB09060;  // furniture
        }
        const map = {
            [T.GROUND]: 0x6B4830, [T.GRASS]: 0x4A8C38, [T.BRICK]: 0xC08060,
            [T.DIRT]: 0x8B6840, [T.DIRT_SOFT]: 0xC0A060, [T.PLATFORM]: 0x806040,
            [T.SPIKE]: 0x808080, [T.WATER]: 0x4080D0, [T.ICE]: 0xC0E8F8,
            [T.CRACKED]: 0xC08060, [T.BARRIER]: 0xA0A0A0, [T.FENCE]: 0xC8B898,
            [T.HYDRANT]: 0xD03030, [T.DOOR]: 0x805020, [T.BRIDGE]: 0x806040,
            [T.CAVE_WALL]: 0x3A3A4A, [T.TREE_TRUNK]: 0x6B4830, [T.TREE_TOP]: 0x3A8A3A
        };
        return map[tile] || 0x808080;
    }

    getDogColor() {
        return { mango: 0xF0E0B8, violet: 0x9898A8, mochi: 0xD07030 }[this.dogType];
    }

    getLevelName() {
        const names = {
            '1-1': '1-1: The Front Yard', '1-2': '1-2: Sidewalk Scramble',
            '1-3': '1-3: The Dog Park', '1-4': '1-4: Dogcatcher Chase',
            '2-1': '2-1: Alley Cats', '2-2': '2-2: Rooftop Run',
            '2-3': '2-3: Construction Zone', '2-4': '2-4: Dogcatcher Returns',
            '3-1': '3-1: River Trail', '3-2': '3-2: Ice Pond',
            '3-3': '3-3: Deep Cave', '3-4': '3-4: Dogcatcher\'s Lair',
        };
        if (this.worldNum === 4) return 'Home Sweet Home';
        return names[this.levelKey] || this.levelKey;
    }

    spawnEnemy(data) {
        const ex = data.x * TILE_SIZE + TILE_SIZE / 2;
        const ey = data.y * TILE_SIZE + TILE_SIZE / 2;

        // Map enemy type to texture key
        const texKey = data.type === 'boss' ? 'boss' : data.type;
        const enemy = this.enemies.create(ex, ey, texKey);
        enemy.enemyType = data.type;
        enemy.patrolDir = 1;
        enemy.patrolTimer = 0;
        enemy.shootTimer = 0;
        enemy.hp = data.type === 'boss' ? (data.phase || 1) * 3 : 1;
        enemy.bossPhase = data.phase || 1;
        enemy.calmed = false;
        enemy.stunTimer = 0;
        enemy.body.setCollideWorldBounds(true);
        enemy.body.setGravityY(GRAVITY);

        if (data.type === 'squirrel') {
            enemy.body.setMaxVelocity(200, 600);
        }
    }

    update(time, delta) {
        if (this.dead || this.won || this.drowning) return;
        this.levelTime += delta;

        // Update timer display
